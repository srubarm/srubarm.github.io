<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matematika</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }
    h1 { margin-bottom: 10px; }
    .progress { font-size: 1rem; color: #888; margin-bottom: 20px; }
    .timer { font-size: 1.1rem; color: #555; margin-bottom: 10px; }
    .player-label { font-size: 1.4rem; color: #4a90d9; font-weight: bold; margin-bottom: 10px; }
    .problem { font-size: 2.5rem; margin: 30px 0; }
    input[type="tel"] {
      font-size: 1.5rem;
      width: 120px;
      text-align: center;
      padding: 8px;
      border: 2px solid #ccc;
      border-radius: 6px;
    }
    input[type="text"] {
      font-size: 1.2rem;
      width: 200px;
      text-align: center;
      padding: 8px;
      border: 2px solid #ccc;
      border-radius: 6px;
      margin: 5px 0;
    }
    button {
      font-size: 1.2rem;
      padding: 8px 24px;
      margin-left: 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #4a90d9;
      color: white;
    }
    .btn-block {
      display: block;
      margin: 15px auto;
    }
    .result { font-size: 1.3rem; margin-top: 20px; min-height: 1.6em; }
    .correct { color: green; }
    .wrong { color: red; }
    .summary {
      margin-top: 30px;
      font-size: 1.3rem;
      line-height: 2;
    }
    .restart-btn {
      margin-top: 30px;
      font-size: 1.2rem;
      padding: 10px 30px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #4a90d9;
      color: white;
    }
    .mode-buttons { margin: 30px 0; }
    .mode-buttons button { margin: 5px 10px; }
    .level-buttons { margin: 20px 0; }
    .level-buttons button {
      display: block;
      margin: 10px auto;
      width: 220px;
    }
    .level-desc { font-size: 0.85rem; color: #888; margin-top: 5px; }
    .comparison-table {
      margin: 30px auto;
      border-collapse: collapse;
      font-size: 1.2rem;
    }
    .comparison-table th, .comparison-table td {
      padding: 10px 25px;
      border-bottom: 1px solid #ddd;
    }
    .comparison-table th { color: #4a90d9; }
    .winner-cell { font-weight: bold; color: green; }
    .loser-cell { color: #999; }
    .winner-banner {
      font-size: 1.8rem;
      font-weight: bold;
      margin: 20px 0;
      color: #e8a020;
    }
    .handoff {
      margin-top: 40px;
      font-size: 1.3rem;
      line-height: 2;
    }
    .score-table {
      margin: 15px auto;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    .score-table th, .score-table td {
      padding: 6px 12px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }
    .score-table th { color: #4a90d9; }
    #personal-best { margin-top: 25px; }
    #score-table-wrap { margin-top: 20px; }
    .user-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 15px;
      margin: 8px auto;
      max-width: 350px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
      text-align: left;
    }
    .user-card .user-info { flex: 1; }
    .user-card .user-name { font-weight: bold; font-size: 1.1rem; }
    .user-card .user-birth { font-size: 0.85rem; color: #888; }
    .user-card .remove-btn {
      background: #e55; color: white; border: none; border-radius: 4px;
      padding: 4px 10px; cursor: pointer; font-size: 0.85rem; margin-left: 10px;
    }
    .no-users { color: #999; font-style: italic; margin: 15px 0; }
  </style>
</head>
<body>
  <h1>Matematika</h1>

  <!-- Mode selection -->
  <div id="menu">
    <div class="mode-buttons">
      <button onclick="startSolo()">Solo</button>
      <button onclick="showCompSetup()">Competition</button>
    </div>
    <div style="margin-top:25px">
      <button onclick="showScoreboard()" style="font-size:0.8em; padding:6px 14px; background:#888;">Top Scores</button>
      <button onclick="showUserManagement()" style="font-size:0.8em; padding:6px 14px; background:#888; margin-left:8px;">Users</button>
    </div>
  </div>

  <!-- Solo name entry -->
  <div id="solo-setup" style="display:none">
    <p>Select your name:</p>
    <select id="solo-user-select" style="font-size:1.2rem; padding:8px; border:2px solid #ccc; border-radius:6px; min-width:200px;">
      <option value="">-- select user --</option>
    </select>
    <br>
    <button class="btn-block" onclick="confirmSoloName()">Next</button>
  </div>

  <!-- User management -->
  <div id="user-management" style="display:none">
    <p><b>Manage Users</b></p>
    <div id="user-list"></div>
    <div style="margin-top:25px; border-top:1px solid #ddd; padding-top:20px;">
      <p><b>Add new user</b></p>
      <input type="text" id="new-user-name" placeholder="Name">
      <br>
      <div style="margin:10px 0;">
        <select id="new-user-month" style="font-size:1rem; padding:6px; border:2px solid #ccc; border-radius:6px;">
          <option value="">Month</option>
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
        <select id="new-user-year" style="font-size:1rem; padding:6px; border:2px solid #ccc; border-radius:6px;">
          <option value="">Year</option>
        </select>
      </div>
      <button class="btn-block" onclick="addUser()">Add User</button>
    </div>
    <div style="margin-top:25px; border-top:1px solid #ddd; padding-top:20px;">
      <p><b>Data Management</b></p>
      <button class="btn-block" onclick="exportData()">Export Data</button>
      <button class="btn-block" onclick="document.getElementById('import-file').click()">Import Data</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <button class="restart-btn" onclick="showMenu()">Back to Menu</button>
  </div>

  <!-- Difficulty selection -->
  <div id="difficulty" style="display:none">
    <p><b>+ / &minus;</b></p>
    <div class="level-buttons">
      <button onclick="pickLevel('add10')">up to 10</button>
      <button onclick="pickLevel('add50')">up to 50</button>
      <button onclick="pickLevel('add200')">up to 200</button>
    </div>
    <p><b>&times;</b></p>
    <div class="level-buttons">
      <button onclick="pickLevel('mul5x5')">1–5 &times; 1–5</button>
      <button onclick="pickLevel('mul5x10')">1–5 &times; 1–10</button>
      <button onclick="pickLevel('mul10x10')">1–10 &times; 1–10</button>
      <button onclick="pickLevel('mul10x20')">1–10 &times; 1–20</button>
      <button onclick="pickLevel('mul10x50')">1–10 &times; 1–50</button>
      <button onclick="pickLevel('mul10x100')">1–10 &times; 1–100</button>
    </div>
    <p><b>&divide;</b></p>
    <div class="level-buttons">
      <button onclick="pickLevel('div50d5')">up to 50 &divide; 1–5</button>
      <button onclick="pickLevel('div100d5')">up to 100 &divide; 1–5</button>
      <button onclick="pickLevel('div50d10')">up to 50 &divide; 1–10</button>
      <button onclick="pickLevel('div100d10')">up to 100 &divide; 1–10</button>
    </div>
    <p><b>&divide; with remainder</b></p>
    <div class="level-buttons">
      <button onclick="pickLevel('divmod50d5')">up to 50 &divide; 1–5</button>
      <button onclick="pickLevel('divmod100d5')">up to 100 &divide; 1–5</button>
      <button onclick="pickLevel('divmod50d10')">up to 50 &divide; 1–10</button>
      <button onclick="pickLevel('divmod100d10')">up to 100 &divide; 1–10</button>
    </div>
  </div>

  <!-- Competition name entry -->
  <div id="comp-setup" style="display:none">
    <p>Select players:</p>
    <div style="margin:10px 0;">
      <label style="font-size:0.9rem; color:#888;">Player 1:</label><br>
      <select id="comp-user-select-1" style="font-size:1.2rem; padding:8px; border:2px solid #ccc; border-radius:6px; min-width:200px;">
        <option value="">-- select user --</option>
      </select>
    </div>
    <div style="margin:10px 0;">
      <label style="font-size:0.9rem; color:#888;">Player 2:</label><br>
      <select id="comp-user-select-2" style="font-size:1.2rem; padding:8px; border:2px solid #ccc; border-radius:6px; min-width:200px;">
        <option value="">-- select user --</option>
      </select>
    </div>
    <button class="btn-block" onclick="startComp()">Start</button>
  </div>

  <!-- Game screen -->
  <div id="game" style="display:none">
    <div class="player-label" id="player-label"></div>
    <div class="progress" id="progress"></div>
    <div class="timer" id="timer">0:00</div>
    <div class="problem" id="problem"></div>
    <div>
      <input type="tel" inputmode="numeric" pattern="[0-9]*" id="answer">
      <span id="remainder-wrap" style="display:none">
        r <input type="tel" inputmode="numeric" pattern="[0-9]*" id="answer-remainder" style="width:60px">
      </span>
      <button onclick="check()">OK</button>
    </div>
    <div class="result" id="result"></div>
  </div>

  <!-- Solo done -->
  <div id="done" style="display:none">
    <div class="summary" id="summary"></div>
    <div id="personal-best"></div>
    <button class="restart-btn" onclick="showMenu()">Back to Menu</button>
  </div>

  <!-- Scoreboard -->
  <div id="scoreboard" style="display:none">
    <p><b>Top Scores</b></p>
    <div class="level-buttons" id="score-level-buttons"></div>
    <div id="score-table-wrap"></div>
    <button class="restart-btn" onclick="showMenu()">Back to Menu</button>
  </div>

  <!-- Handoff between players -->
  <div id="handoff" style="display:none">
    <div class="handoff" id="handoff-msg"></div>
    <button class="restart-btn" id="handoff-btn">Ready</button>
  </div>

  <!-- Competition results -->
  <div id="comp-done" style="display:none">
    <div class="winner-banner" id="winner-banner"></div>
    <table class="comparison-table" id="comp-table">
      <tr>
        <th></th>
        <th id="col1"></th>
        <th id="col2"></th>
      </tr>
      <tr>
        <td>Mistakes</td>
        <td id="m1"></td>
        <td id="m2"></td>
      </tr>
      <tr>
        <td>Time</td>
        <td id="t1"></td>
        <td id="t2"></td>
      </tr>
    </table>
    <button class="restart-btn" onclick="showMenu()">Back to Menu</button>
  </div>

  <script>
    const TOTAL = 10;
    let problems, current, mistakes, startTime, timerInterval, problemStartTime;
    let mode; // 'solo' or 'comp'
    let level;
    let playerNames = [];
    let playerResults = []; // [{mistakes, time, problems, startTime}]
    let compSessionId = null;

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    var LEVELS = {
      add10:    { type: 'add', max: 10 },
      add50:    { type: 'add', max: 50 },
      add200:   { type: 'add', max: 200 },
      mul5x5:   { type: 'mul', maxA: 5,  maxB: 5 },
      mul5x10:  { type: 'mul', maxA: 5,  maxB: 10 },
      mul10x10: { type: 'mul', maxA: 10, maxB: 10 },
      mul10x20: { type: 'mul', maxA: 10, maxB: 20 },
      mul10x50: { type: 'mul', maxA: 10, maxB: 50 },
      mul10x100:{ type: 'mul', maxA: 10, maxB: 100 },
      div50d5:    { type: 'div', maxDividend: 50,  maxDivisor: 5 },
      div100d5:   { type: 'div', maxDividend: 100, maxDivisor: 5 },
      div50d10:   { type: 'div', maxDividend: 50,  maxDivisor: 10 },
      div100d10:  { type: 'div', maxDividend: 100, maxDivisor: 10 },
      divmod50d5:   { type: 'divmod', maxDividend: 50,  maxDivisor: 5 },
      divmod100d5:  { type: 'divmod', maxDividend: 100, maxDivisor: 5 },
      divmod50d10:  { type: 'divmod', maxDividend: 50,  maxDivisor: 10 },
      divmod100d10: { type: 'divmod', maxDividend: 100, maxDivisor: 10 },
    };

    var LEVEL_LABELS = {
      add10: '+ / \u2212 up to 10',
      add50: '+ / \u2212 up to 50',
      add200: '+ / \u2212 up to 200',
      mul5x5: '1\u20135 \u00d7 1\u20135',
      mul5x10: '1\u20135 \u00d7 1\u201310',
      mul10x10: '1\u201310 \u00d7 1\u201310',
      mul10x20: '1\u201310 \u00d7 1\u201320',
      mul10x50: '1\u201310 \u00d7 1\u201350',
      mul10x100: '1\u201310 \u00d7 1\u2013100',
      div50d5: '\u00f7 up to 50 by 1\u20135',
      div100d5: '\u00f7 up to 100 by 1\u20135',
      div50d10: '\u00f7 up to 50 by 1\u201310',
      div100d10: '\u00f7 up to 100 by 1\u201310',
      divmod50d5: '\u00f7r up to 50 by 1\u20135',
      divmod100d5: '\u00f7r up to 100 by 1\u20135',
      divmod50d10: '\u00f7r up to 50 by 1\u201310',
      divmod100d10: '\u00f7r up to 100 by 1\u201310',
    };

    // --- Unified data layer ---

    var DEFAULT_DATA = { version: 1, users: [], tests: [], settings: { ApiKey: '' } };

    function getAppData() {
      try {
        var data = JSON.parse(localStorage.getItem('math_app_data'));
        if (data && data.version) return data;
        return JSON.parse(JSON.stringify(DEFAULT_DATA));
      } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
    }

    function saveAppData(data) {
      localStorage.setItem('math_app_data', JSON.stringify(data));
    }

    function getUsers() {
      return getAppData().users;
    }

    function saveUsers(users) {
      var data = getAppData();
      data.users = users;
      saveAppData(data);
    }

    function addTestResult(testObj) {
      var data = getAppData();
      data.tests.push(testObj);
      saveAppData(data);
    }

    function getTopScores(lv, limit) {
      var data = getAppData();
      var scores = data.tests
        .filter(function(t) { return t.level === lv; })
        .map(function(t) {
          var mistakeCount = t.problems.filter(function(p) { return !p.correct; }).length;
          var timeSec = Math.floor((new Date(t.dateCompleted) - new Date(t.dateStarted)) / 1000);
          return { name: t.userId, mistakes: mistakeCount, time: timeSec, date: t.dateCompleted };
        });
      scores.sort(function(a, b) { return a.mistakes - b.mistakes || a.time - b.time; });
      return scores.slice(0, limit || 20);
    }

    function getSetting(key) {
      return getAppData().settings[key] || '';
    }

    function setSetting(key, value) {
      var data = getAppData();
      data.settings[key] = value;
      saveAppData(data);
    }

    // --- Problem generation ---

    function generateProblems() {
      var cfg = LEVELS[level];
      const list = [];
      for (let i = 0; i < TOTAL; i++) {
        let a, b, op, answer;
        if (cfg.type === 'mul') {
          a = randInt(1, cfg.maxA);
          b = randInt(1, cfg.maxB);
          op = '\u00d7';
          answer = a * b;
        } else if (cfg.type === 'div') {
          b = randInt(1, cfg.maxDivisor);
          var quotient = randInt(1, Math.floor(cfg.maxDividend / b));
          a = b * quotient;
          op = '\u00f7';
          answer = quotient;
        } else if (cfg.type === 'divmod') {
          b = randInt(2, cfg.maxDivisor);
          a = randInt(1, cfg.maxDividend);
          op = '\u00f7';
          answer = Math.floor(a / b);
          var remainder = a % b;
          list.push({ a: a, b: b, op: op, answer: answer, remainder: remainder });
          continue;
        } else {
          a = randInt(1, cfg.max);
          b = randInt(1, cfg.max);
          op = Math.random() < 0.5 ? '+' : '-';
          if (op === '-' && b > a) { [a, b] = [b, a]; }
          answer = op === '+' ? a + b : a - b;
        }
        list.push({ a: a, b: b, op: op, answer: answer });
      }
      return list;
    }

    function formatProblemString(p) {
      return p.a + ' ' + p.op + ' ' + p.b;
    }

    function formatCorrectAnswer(p) {
      if (typeof p.remainder !== 'undefined') return String(p.answer) + ' r ' + p.remainder;
      return String(p.answer);
    }

    function buildTestObject(userId, isComp) {
      return {
        id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
        userId: userId,
        level: level,
        isCompetitionMode: isComp,
        competitionSessionId: isComp ? compSessionId : null,
        dateStarted: new Date(startTime).toISOString(),
        dateCompleted: new Date().toISOString(),
        problems: problems.map(function(p) {
          return {
            problem: formatProblemString(p),
            correctAnswer: formatCorrectAnswer(p),
            userAnswer: p.userAnswer || '',
            correct: !!p.correct,
            timeTaken: p.timeTaken || 0
          };
        })
      };
    }

    // --- Game UI ---

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return m + ':' + String(s).padStart(2, '0');
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('timer').textContent = formatTime(elapsed);
    }

    function hideAll() {
      ['menu','solo-setup','difficulty','comp-setup','game','done','handoff','comp-done','scoreboard','user-management'].forEach(function(id) {
        document.getElementById(id).style.display = 'none';
      });
    }

    function showMenu() {
      hideAll();
      document.getElementById('menu').style.display = 'block';
    }

    function isDivmod() {
      return LEVELS[level] && LEVELS[level].type === 'divmod';
    }

    function showProblem() {
      problemStartTime = Date.now();
      const p = problems[current];
      document.getElementById('progress').textContent = (current + 1) + ' / ' + TOTAL;
      document.getElementById('problem').textContent = p.a + ' ' + p.op + ' ' + p.b + ' = ?';
      const inp = document.getElementById('answer');
      inp.value = '';
      document.getElementById('result').textContent = '';
      var remWrap = document.getElementById('remainder-wrap');
      var remInp = document.getElementById('answer-remainder');
      if (isDivmod()) {
        remWrap.style.display = 'inline';
        remInp.value = '';
      } else {
        remWrap.style.display = 'none';
      }
      inp.focus();
      setTimeout(function() { inp.focus(); }, 50);
    }

    function runGame(label) {
      hideAll();
      document.getElementById('game').style.display = 'block';
      document.getElementById('player-label').textContent = label;
      current = 0;
      mistakes = 0;
      startTime = Date.now();
      clearInterval(timerInterval);
      document.getElementById('timer').textContent = '0:00';
      timerInterval = setInterval(updateTimer, 1000);
      showProblem();
    }

    function check() {
      var timeTaken = Math.round((Date.now() - problemStartTime) / 100) / 10;
      const val = parseInt(document.getElementById('answer').value);
      if (isNaN(val)) return;
      var remVal = 0;
      if (isDivmod()) {
        remVal = parseInt(document.getElementById('answer-remainder').value);
        if (isNaN(remVal)) return;
      }
      const el = document.getElementById('result');
      const p = problems[current];

      var correct;
      if (isDivmod()) {
        correct = val === p.answer && remVal === p.remainder;
      } else {
        correct = val === p.answer;
      }

      // Capture per-problem data
      p.timeTaken = timeTaken;
      p.correct = correct;
      if (isDivmod()) {
        p.userAnswer = String(val) + ' r ' + String(remVal);
      } else {
        p.userAnswer = String(val);
      }

      if (correct) {
        el.textContent = 'Correct!';
        el.className = 'result correct';
      } else {
        var rightAnswer = String(p.answer);
        if (isDivmod()) rightAnswer += ' r ' + p.remainder;
        mistakes++;
        el.textContent = 'Wrong \u2014 answer is ' + rightAnswer;
        el.className = 'result wrong';
      }

      current++;
      if (current < TOTAL) {
        setTimeout(showProblem, 1000);
      } else {
        setTimeout(finish, 1000);
      }
    }

    function finish() {
      clearInterval(timerInterval);
      const elapsed = Math.floor((Date.now() - startTime) / 1000);

      if (mode === 'solo') {
        var testObj = buildTestObject(soloName, false);
        addTestResult(testObj);
        var scores = getTopScores(level, 20);
        hideAll();
        document.getElementById('done').style.display = 'block';
        document.getElementById('summary').innerHTML =
          '<b>' + soloName + '</b><br>' +
          'Mistakes: <b>' + mistakes + '</b><br>' +
          'Time: <b>' + formatTime(elapsed) + '</b>';
        document.getElementById('personal-best').innerHTML =
          '<p><b>Top scores \u2013 ' + LEVEL_LABELS[level] + '</b></p>' +
          buildScoreTable(scores.slice(0, 5));
      } else if (mode === 'comp') {
        // Save this player's test immediately (before player 2 overwrites problems)
        var currentPlayerIndex = playerResults.length;
        var testObj = buildTestObject(playerNames[currentPlayerIndex], true);
        addTestResult(testObj);
        playerResults.push({ mistakes: mistakes, time: elapsed });
        if (playerResults.length === 1) {
          hideAll();
          document.getElementById('handoff').style.display = 'block';
          document.getElementById('handoff-msg').innerHTML =
            '<b>' + playerNames[0] + '</b> is done!<br><br>' +
            'Hand the device to <b>' + playerNames[1] + '</b> and press Ready.';
          document.getElementById('handoff-btn').onclick = function() { startPlayer(1); };
        } else {
          showCompResults();
        }
      }
    }

    function showCompResults() {
      hideAll();
      document.getElementById('comp-done').style.display = 'block';
      const r1 = playerResults[0];
      const r2 = playerResults[1];

      document.getElementById('col1').textContent = playerNames[0];
      document.getElementById('col2').textContent = playerNames[1];

      const m1El = document.getElementById('m1');
      const m2El = document.getElementById('m2');
      const t1El = document.getElementById('t1');
      const t2El = document.getElementById('t2');

      m1El.textContent = r1.mistakes;
      m2El.textContent = r2.mistakes;
      t1El.textContent = formatTime(r1.time);
      t2El.textContent = formatTime(r2.time);

      let winner;
      if (r1.mistakes < r2.mistakes) winner = 0;
      else if (r2.mistakes < r1.mistakes) winner = 1;
      else if (r1.time < r2.time) winner = 0;
      else if (r2.time < r1.time) winner = 1;
      else winner = -1;

      m1El.className = r1.mistakes <= r2.mistakes ? 'winner-cell' : 'loser-cell';
      m2El.className = r2.mistakes <= r1.mistakes ? 'winner-cell' : 'loser-cell';
      t1El.className = r1.time <= r2.time ? 'winner-cell' : 'loser-cell';
      t2El.className = r2.time <= r1.time ? 'winner-cell' : 'loser-cell';

      const banner = document.getElementById('winner-banner');
      if (winner === -1) {
        banner.textContent = "It's a tie!";
      } else {
        banner.textContent = playerNames[winner] + ' wins!';
      }
    }

    // --- Mode launchers ---

    var soloName = '';

    // --- User management ---

    var MONTH_NAMES = ['January','February','March','April','May','June',
      'July','August','September','October','November','December'];

    function addUser() {
      var name = document.getElementById('new-user-name').value.trim();
      var month = parseInt(document.getElementById('new-user-month').value);
      var year = parseInt(document.getElementById('new-user-year').value);
      if (!name) { alert('Please enter a name.'); return; }
      if (!month || !year) { alert('Please select month and year of birth.'); return; }
      var users = getUsers();
      var existing = users.find(function(u) { return u.name.toLowerCase() === name.toLowerCase(); });
      if (existing) { alert('A user with this name already exists.'); return; }
      users.push({ id: name, name: name, dateCreated: new Date().toISOString(), birthMonth: month, birthYear: year });
      users.sort(function(a, b) { return a.name.localeCompare(b.name); });
      saveUsers(users);
      document.getElementById('new-user-name').value = '';
      document.getElementById('new-user-month').value = '';
      document.getElementById('new-user-year').value = '';
      renderUserList();
    }

    function removeUser(index) {
      var users = getUsers();
      var user = users[index];
      if (!confirm('Remove ' + user.name + '?')) return;
      users.splice(index, 1);
      saveUsers(users);
      renderUserList();
    }

    function renderUserList() {
      var users = getUsers();
      var el = document.getElementById('user-list');
      if (users.length === 0) {
        el.innerHTML = '<p class="no-users">No users added yet.</p>';
        return;
      }
      var h = '';
      users.forEach(function(u, i) {
        h += '<div class="user-card">' +
          '<div class="user-info"><span class="user-name">' + u.name + '</span><br>' +
          '<span class="user-birth">' + MONTH_NAMES[u.birthMonth - 1] + ' ' + u.birthYear + '</span></div>' +
          '<button class="remove-btn" onclick="removeUser(' + i + ')">Remove</button></div>';
      });
      el.innerHTML = h;
    }

    function populateYearDropdown() {
      var sel = document.getElementById('new-user-year');
      var currentYear = new Date().getFullYear();
      for (var y = currentYear; y >= currentYear - 100; y--) {
        var opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        sel.appendChild(opt);
      }
    }

    function showUserManagement() {
      hideAll();
      document.getElementById('user-management').style.display = 'block';
      renderUserList();
    }

    function populateUserSelect(selectId) {
      var sel = document.getElementById(selectId);
      var users = getUsers();
      sel.innerHTML = '<option value="">-- select user --</option>';
      users.forEach(function(u) {
        var opt = document.createElement('option');
        opt.value = u.name;
        opt.textContent = u.name;
        sel.appendChild(opt);
      });
    }

    function startSolo() {
      mode = 'solo';
      hideAll();
      populateUserSelect('solo-user-select');
      document.getElementById('solo-setup').style.display = 'block';
      var lastName = getSetting('lastSoloName');
      document.getElementById('solo-user-select').value = lastName;
    }

    function confirmSoloName() {
      soloName = document.getElementById('solo-user-select').value;
      if (!soloName) { alert('Please select a user.'); return; }
      setSetting('lastSoloName', soloName);
      hideAll();
      document.getElementById('difficulty').style.display = 'block';
    }

    populateYearDropdown();

    // --- Scoreboard ---

    function formatDate(iso) {
      var d = new Date(iso);
      return d.getDate() + '/' + (d.getMonth() + 1) + '/' + d.getFullYear() + ' ' +
        String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }

    function buildScoreTable(scores) {
      if (scores.length === 0) return '<p>No scores yet.</p>';
      var h = '<table class="score-table"><tr><th>#</th><th>Name</th><th>Mistakes</th><th>Time</th><th>Date</th></tr>';
      scores.forEach(function(s, i) {
        h += '<tr><td>' + (i + 1) + '</td><td>' + s.name + '</td><td>' + s.mistakes +
          '</td><td>' + formatTime(s.time) + '</td><td>' + formatDate(s.date) + '</td></tr>';
      });
      h += '</table>';
      return h;
    }

    function showScoreboard() {
      hideAll();
      document.getElementById('scoreboard').style.display = 'block';
      var btns = '';
      Object.keys(LEVEL_LABELS).forEach(function(lv) {
        btns += '<button onclick="showScoresFor(\'' + lv + '\')">' + LEVEL_LABELS[lv] + '</button>';
      });
      document.getElementById('score-level-buttons').innerHTML = btns;
      document.getElementById('score-table-wrap').innerHTML = '<p>Select a level above.</p>';
    }

    function showScoresFor(lv) {
      var scores = getTopScores(lv, 20);
      document.getElementById('score-table-wrap').innerHTML =
        '<p><b>' + LEVEL_LABELS[lv] + '</b></p>' + buildScoreTable(scores);
    }

    // --- Competition setup ---

    function showCompSetup() {
      hideAll();
      populateUserSelect('comp-user-select-1');
      populateUserSelect('comp-user-select-2');
      document.getElementById('comp-setup').style.display = 'block';
    }

    function startComp() {
      const n1 = document.getElementById('comp-user-select-1').value;
      const n2 = document.getElementById('comp-user-select-2').value;
      if (!n1 || !n2) { alert('Please select both players.'); return; }
      if (n1 === n2) { alert('Please select two different players.'); return; }
      playerNames = [n1, n2];
      playerResults = [];
      mode = 'comp';
      hideAll();
      document.getElementById('difficulty').style.display = 'block';
    }

    function pickLevel(lv) {
      level = lv;
      problems = generateProblems();
      if (mode === 'comp') {
        compSessionId = 'comp-' + new Date().toISOString();
      }
      if (mode === 'solo') {
        runGame('');
      } else {
        hideAll();
        document.getElementById('handoff').style.display = 'block';
        document.getElementById('handoff-msg').innerHTML =
          'Hand the device to <b>' + playerNames[0] + '</b> and press Ready.';
        document.getElementById('handoff-btn').onclick = function() { startPlayer(0); };
      }
    }

    function startPlayer(index) {
      runGame(playerNames[index]);
    }

    // --- Export / Import ---

    function exportData() {
      var data = getAppData();
      var exportObj = JSON.parse(JSON.stringify(data));
      exportObj.exportedAt = new Date().toISOString();
      var blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'math_app_data_' + new Date().toISOString().slice(0, 10) + '.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(event) {
      var file = event.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var data = JSON.parse(e.target.result);
          if (!data.version || !Array.isArray(data.users) || !Array.isArray(data.tests)) {
            alert('Invalid file format.');
            return;
          }
          if (!confirm('This will replace all current data. Continue?')) return;
          delete data.exportedAt;
          if (!data.settings || typeof data.settings !== 'object') {
            data.settings = { ApiKey: '' };
          }
          saveAppData(data);
          renderUserList();
          alert('Data imported successfully.');
        } catch(err) {
          alert('Error reading file: ' + err.message);
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // --- Keyboard handlers ---

    document.getElementById('answer').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        if (isDivmod()) {
          document.getElementById('answer-remainder').focus();
        } else {
          check();
        }
      }
    });

    document.getElementById('answer-remainder').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') check();
    });
  </script>
</body>
</html>
