<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matematika</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }
    h1 { margin-bottom: 10px; }
    .progress { font-size: 1rem; color: #888; margin-bottom: 20px; }
    .timer { font-size: 1.1rem; color: #555; margin-bottom: 10px; }
    .player-label { font-size: 1.4rem; color: #4a90d9; font-weight: bold; margin-bottom: 10px; }
    .problem { font-size: 2.5rem; margin: 30px 0; }
    input[type="tel"] {
      font-size: 1.5rem;
      width: 120px;
      text-align: center;
      padding: 8px;
      border: 2px solid #ccc;
      border-radius: 6px;
    }
    input[type="text"] {
      font-size: 1.2rem;
      width: 200px;
      text-align: center;
      padding: 8px;
      border: 2px solid #ccc;
      border-radius: 6px;
      margin: 5px 0;
    }
    button {
      font-size: 1.2rem;
      padding: 8px 24px;
      margin-left: 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #4a90d9;
      color: white;
    }
    .btn-block {
      display: block;
      margin: 15px auto;
    }
    .result { font-size: 1.3rem; margin-top: 20px; min-height: 1.6em; }
    .correct { color: green; }
    .wrong { color: red; }
    .summary {
      margin-top: 30px;
      font-size: 1.3rem;
      line-height: 2;
    }
    .restart-btn {
      margin-top: 30px;
      font-size: 1.2rem;
      padding: 10px 30px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #4a90d9;
      color: white;
    }
    .mode-buttons { margin: 30px 0; }
    .mode-buttons button { margin: 5px 10px; }
    .level-buttons { margin: 20px 0; }
    .level-buttons button {
      display: block;
      margin: 10px auto;
      width: 220px;
    }
    .level-desc { font-size: 0.85rem; color: #888; margin-top: 5px; }
    .comparison-table {
      margin: 30px auto;
      border-collapse: collapse;
      font-size: 1.2rem;
    }
    .comparison-table th, .comparison-table td {
      padding: 10px 25px;
      border-bottom: 1px solid #ddd;
    }
    .comparison-table th { color: #4a90d9; }
    .winner-cell { font-weight: bold; color: green; }
    .loser-cell { color: #999; }
    .winner-banner {
      font-size: 1.8rem;
      font-weight: bold;
      margin: 20px 0;
      color: #e8a020;
    }
    .handoff {
      margin-top: 40px;
      font-size: 1.3rem;
      line-height: 2;
    }
    .score-table {
      margin: 15px auto;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    .score-table th, .score-table td {
      padding: 6px 12px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }
    .score-table th { color: #4a90d9; }
    #personal-best { margin-top: 25px; }
    #score-table-wrap { margin-top: 20px; }
    .user-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 15px;
      margin: 8px auto;
      max-width: 350px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
      text-align: left;
    }
    .user-card .user-info { flex: 1; }
    .user-card .user-name { font-weight: bold; font-size: 1.1rem; }
    .user-card .user-birth { font-size: 0.85rem; color: #888; }
    .user-card .remove-btn {
      background: #e55; color: white; border: none; border-radius: 4px;
      padding: 4px 10px; cursor: pointer; font-size: 0.85rem; margin-left: 10px;
    }
    .no-users { color: #999; font-style: italic; margin: 15px 0; }
    .ai-dashboard-card {
      text-align: left;
      max-width: 400px;
      margin: 15px auto;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
    }
    .ai-grade { font-size: 1.3rem; font-weight: bold; color: #4a90d9; margin-bottom: 8px; }
    .ai-skills { font-size: 0.9rem; line-height: 1.8; }
    .ai-skill-line { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 2px 0; }
    .ai-skill-name { color: #555; }
    .ai-skill-level { font-weight: bold; }
    .ai-skill-level.strong { color: #2a9d2a; }
    .ai-skill-level.developing { color: #e8a020; }
    .ai-skill-level.emerging { color: #d97a2a; }
    .ai-skill-level.not-started { color: #999; }
    .ai-history-item {
      text-align: left;
      max-width: 400px;
      margin: 8px auto;
      padding: 10px 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 0.9rem;
    }
    .ai-history-item .test-name { font-weight: bold; }
    .ai-history-item .test-detail { color: #888; font-size: 0.85rem; }
    .ai-eval-box {
      text-align: left;
      max-width: 400px;
      margin: 15px auto;
      padding: 12px;
      background: #f0f7f0;
      border-radius: 8px;
      font-size: 0.95rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Matematika</h1>

  <!-- Mode selection -->
  <div id="menu">
    <div id="menu-user-area"></div>
    <div id="menu-buttons" style="display:none;">
      <div class="mode-buttons">
        <button onclick="startSolo()">Solo</button>
        <button onclick="showCompSetup()">Competition</button>
      </div>
      <div id="ai-teacher-menu-wrap" style="margin-top:15px; display:none;">
        <button onclick="startAITeacher()" style="background:#2a9d2a;">Practice with AI Teacher</button>
      </div>
      <div style="margin-top:25px">
        <button onclick="showScoreboard()" style="font-size:0.8em; padding:6px 14px; background:#888;">Top Scores</button>
        <button onclick="showUserManagement()" style="font-size:0.8em; padding:6px 14px; background:#888; margin-left:8px;">Users</button>
        <button onclick="showDataManagement()" style="font-size:0.8em; padding:6px 14px; background:#888; margin-left:8px;">Data</button>
      </div>
    </div>
  </div>

  <!-- AI Teacher: dashboard -->
  <div id="ai-teacher-dashboard" style="display:none">
    <p><b>AI Teacher</b> &mdash; <span id="ai-teacher-name"></span></p>
    <div id="ai-teacher-progress"></div>
    <div id="ai-teacher-last-eval"></div>
    <div id="ai-teacher-history"></div>
    <div id="ai-teacher-actions" style="margin-top:20px;"></div>
    <button class="restart-btn" onclick="showMenu()" style="font-size:0.9rem; padding:6px 14px; background:#888;">Back to Menu</button>
  </div>

  <!-- AI Teacher: loading/generating -->
  <div id="ai-teacher-loading" style="display:none">
    <p id="ai-teacher-loading-msg">Generating test...</p>
    <div style="margin-top:20px; color:#888;">This may take a few seconds.</div>
  </div>

  <!-- AI Teacher: post-test evaluation -->
  <div id="ai-teacher-eval" style="display:none">
    <div class="summary" id="ai-teacher-eval-summary"></div>
    <div id="ai-teacher-eval-result"></div>
    <button class="restart-btn" onclick="showAITeacherDashboard(aiTeacherUser)">Back to Dashboard</button>
  </div>

  <!-- User management -->
  <div id="user-management" style="display:none">
    <p><b>Manage Users</b></p>
    <div id="user-list"></div>
    <div style="margin-top:25px; border-top:1px solid #ddd; padding-top:20px;">
      <p><b>Add new user</b></p>
      <input type="text" id="new-user-name" placeholder="Name">
      <br>
      <div style="margin:10px 0;">
        <select id="new-user-month" style="font-size:1rem; padding:6px; border:2px solid #ccc; border-radius:6px;">
          <option value="">Month</option>
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
        <select id="new-user-year" style="font-size:1rem; padding:6px; border:2px solid #ccc; border-radius:6px;">
          <option value="">Year</option>
        </select>
      </div>
      <button class="btn-block" onclick="addUser()">Add User</button>
    </div>
    <button class="restart-btn" onclick="showMenu()">Back to Menu</button>
  </div>

  <!-- Data management -->
  <div id="data-management" style="display:none">
    <p><b>Data Management</b></p>
    <button class="btn-block" onclick="exportData()">Export Data</button>
    <button class="btn-block" onclick="document.getElementById('import-file').click()">Import Data</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <div style="margin-top:25px; border-top:1px solid #ddd; padding-top:20px;">
      <p><b>Settings</b></p>
      <label style="font-size:0.9rem; color:#888;">Google AI API Key:</label><br>
      <input type="password" id="api-key-input" placeholder="Enter API key" style="font-size:1rem; width:250px; padding:6px; border:2px solid #ccc; border-radius:6px; margin:5px 0;">
      <br>
      <label style="font-size:0.9rem; color:#888;">AI Model:</label><br>
      <input type="text" id="ai-model-input" placeholder="gemini-flash-latest" style="font-size:1rem; width:250px; padding:6px; border:2px solid #ccc; border-radius:6px; margin:5px 0;">
      <br>
      <button onclick="saveAISettings()" style="font-size:0.9rem; padding:6px 14px;">Save</button>
      <div id="api-key-status" style="font-size:0.85rem; color:#4a90d9; margin-top:4px;"></div>
    </div>
    <button class="restart-btn" onclick="showMenu()">Back to Menu</button>
  </div>

  <!-- Difficulty selection -->
  <div id="difficulty" style="display:none">
    <div id="level-buttons-container"></div>
    <div id="solo-ai-generate-wrap" style="display:none; margin-top:20px;">
      <button onclick="generateAITest(soloName)" style="background:#2a9d2a;">Generate test based on your previous results</button>
    </div>
    <div style="margin-top:25px; border-top:1px solid #ddd; padding-top:15px;">
      <button onclick="document.getElementById('custom-test-file').click()" style="font-size:0.9em; padding:6px 14px; background:#888;">Load Custom Test</button>
      <input type="file" id="custom-test-file" accept=".json" style="display:none" onchange="loadCustomTest(event)">
      <div id="custom-test-name" style="margin-top:8px; font-size:0.9rem; color:#4a90d9;"></div>
      <div id="custom-test-start" style="display:none; margin-top:8px;">
        <button onclick="pickCustomTest()">Start Custom Test</button>
      </div>
    </div>
  </div>

  <!-- Competition: select competitor -->
  <div id="comp-setup" style="display:none">
    <p><b><span id="comp-player1-name"></span></b> vs ...</p>
    <div style="margin:10px 0;">
      <label style="font-size:0.9rem; color:#888;">Select competitor:</label><br>
      <select id="comp-user-select-2" style="font-size:1.2rem; padding:8px; border:2px solid #ccc; border-radius:6px; min-width:200px;">
        <option value="">-- select user --</option>
      </select>
    </div>
    <div id="comp-add-user-area" style="margin:15px 0;">
      <button id="comp-add-user-btn" onclick="document.getElementById('comp-add-user-btn').style.display='none'; document.getElementById('comp-add-user-form').style.display='block';" style="font-size:0.9rem; padding:6px 14px; background:#888;">Add new user</button>
      <div id="comp-add-user-form" style="display:none; border-top:1px solid #ddd; padding-top:15px; margin-top:10px;">
        <input type="text" id="comp-new-user-name" placeholder="Name">
        <div style="margin:10px 0;">
          <select id="comp-new-user-month" style="font-size:1rem; padding:6px; border:2px solid #ccc; border-radius:6px;">
            <option value="">Month</option>
          </select>
          <select id="comp-new-user-year" style="font-size:1rem; padding:6px; border:2px solid #ccc; border-radius:6px;">
            <option value="">Year</option>
          </select>
        </div>
        <button onclick="addCompUser()" style="font-size:0.9rem; padding:6px 14px;">Add &amp; Select</button>
      </div>
    </div>
    <button class="btn-block" onclick="startComp()">Start</button>
    <button class="restart-btn" onclick="showMenu()" style="font-size:0.9rem; padding:6px 14px; background:#888;">Back</button>
  </div>

  <!-- Game screen -->
  <div id="game" style="display:none">
    <div class="player-label" id="player-label"></div>
    <div class="progress" id="progress"></div>
    <div class="timer" id="timer">0:00</div>
    <div class="problem" id="problem"></div>
    <div>
      <input type="tel" inputmode="numeric" pattern="[0-9]*" id="answer">
      <span id="remainder-wrap" style="display:none">
        r <input type="tel" inputmode="numeric" pattern="[0-9]*" id="answer-remainder" style="width:60px">
      </span>
      <button onclick="check()">OK</button>
    </div>
    <div class="result" id="result"></div>
  </div>

  <!-- Solo done -->
  <div id="done" style="display:none">
    <div class="summary" id="summary"></div>
    <div id="personal-best"></div>
    <div id="ai-evaluate-wrap" style="display:none; margin-top:15px;">
      <button id="ai-evaluate-btn" onclick="requestAIEvaluation()" style="font-size:1rem; padding:8px 18px; background:#2a9d2a; color:white; border:none; border-radius:6px; cursor:pointer;">AI Evaluate</button>
      <div id="ai-evaluation" style="margin-top:12px; padding:12px; background:#f5f5f5; border-radius:8px; font-size:0.95rem; line-height:1.5; text-align:left; display:none;"></div>
    </div>
    <button class="restart-btn" onclick="showMenu()">Back to Menu</button>
  </div>

  <!-- Scoreboard -->
  <div id="scoreboard" style="display:none">
    <p><b>User Leaderboard</b></p>
    <div id="user-leaderboard"></div>
    <div style="margin-top:30px;">
      <p><b>Top Scores by Level</b></p>
      <div class="level-buttons" id="score-level-buttons"></div>
      <div id="score-table-wrap"></div>
    </div>
    <button class="restart-btn" onclick="showMenu()">Back to Menu</button>
  </div>

  <!-- Handoff between players -->
  <div id="handoff" style="display:none">
    <div class="handoff" id="handoff-msg"></div>
    <button class="restart-btn" id="handoff-btn">Ready</button>
  </div>

  <!-- Competition results -->
  <div id="comp-done" style="display:none">
    <div class="winner-banner" id="winner-banner"></div>
    <table class="comparison-table" id="comp-table">
      <tr>
        <th></th>
        <th id="col1"></th>
        <th id="col2"></th>
      </tr>
      <tr>
        <td>Mistakes</td>
        <td id="m1"></td>
        <td id="m2"></td>
      </tr>
      <tr>
        <td>Time</td>
        <td id="t1"></td>
        <td id="t2"></td>
      </tr>
    </table>
    <button class="restart-btn" onclick="showMenu()">Back to Menu</button>
  </div>

  <script>
    const TOTAL = 10;
    let problems, current, mistakes, startTime, timerInterval, problemStartTime;
    let mode; // 'solo' or 'comp'
    let level;
    let playerNames = [];
    let playerResults = []; // [{mistakes, time, problems, startTime}]
    let compSessionId = null;
    let customTestProblems = null; // session-only: loaded custom test problems
    let customTestName = null;     // session-only: loaded custom test name

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // Level definitions: grouped by category for menu rendering
    var LEVEL_GROUPS = [
      { title: '+ / \u2212', levels: [
        { id: 'add10',       label: 'up to 10',              type: 'add', max: 10 },
        { id: 'add50',       label: 'up to 50',              type: 'add', max: 50 },
        { id: 'add200',      label: 'up to 200',             type: 'add', max: 200 },
      ]},
      { title: '\u00d7', levels: [
        { id: 'mul5x5',      label: '1\u20135 \u00d7 1\u20135',       type: 'mul', minA: 1, maxA: 5,  minB: 1, maxB: 5 },
        { id: 'mul10x10',    label: '1\u201310 \u00d7 1\u201310',     type: 'mul', minA: 1, maxA: 10, minB: 1, maxB: 10 },
        { id: 'mul12x12',    label: '1\u201312 \u00d7 1\u201312',     type: 'mul', minA: 1, maxA: 12, minB: 1, maxB: 12 },
        { id: 'mul12x50',    label: '2\u201312 \u00d7 11\u201350',    type: 'mul', minA: 2, maxA: 12, minB: 11, maxB: 50 },
        { id: 'mul20x100',   label: '2\u201320 \u00d7 10\u2013100',   type: 'mul', minA: 2, maxA: 20, minB: 10, maxB: 100 },
      ]},
      { title: '\u00f7', levels: [
        { id: 'div50d5',     label: 'up to 50 \u00f7 1\u20135',       type: 'div', maxDividend: 50,  minDivisor: 1, maxDivisor: 5 },
        { id: 'div100d10',   label: 'up to 100 \u00f7 1\u201310',     type: 'div', maxDividend: 100, minDivisor: 1, maxDivisor: 10 },
        { id: 'div200d10',   label: 'up to 200 \u00f7 1\u201310',     type: 'div', maxDividend: 200, minDivisor: 1, maxDivisor: 10 },
      ]},
      { title: '\u00f7 with remainder', levels: [
        { id: 'divmod50d5',  label: 'up to 50 \u00f7 2\u20135',       type: 'divmod', maxDividend: 50,  minDivisor: 2, maxDivisor: 5 },
        { id: 'divmod100d10',label: 'up to 100 \u00f7 2\u201310',     type: 'divmod', maxDividend: 100, minDivisor: 2, maxDivisor: 10 },
        { id: 'divmod200d10',label: 'up to 200 \u00f7 2\u201310',     type: 'divmod', maxDividend: 200, minDivisor: 2, maxDivisor: 10 },
      ]},
    ];

    // Build flat lookups from LEVEL_GROUPS
    var LEVELS = {};
    var LEVEL_LABELS = {};
    LEVEL_GROUPS.forEach(function(g) {
      g.levels.forEach(function(lv) {
        LEVELS[lv.id] = lv;
        LEVEL_LABELS[lv.id] = g.title + ' ' + lv.label;
      });
    });

    function renderLevelButtons() {
      var container = document.getElementById('level-buttons-container');
      var html = '';
      LEVEL_GROUPS.forEach(function(g) {
        html += '<p><b>' + g.title + '</b></p><div class="level-buttons">';
        g.levels.forEach(function(lv) {
          html += '<button onclick="pickLevel(\'' + lv.id + '\')">' + lv.label + '</button>';
        });
        html += '</div>';
      });
      container.innerHTML = html;
    }

    // --- Unified data layer ---

    var DEFAULT_DATA = { version: 1, users: [], tests: [], settings: { ApiKey: '' } };

    function getAppData() {
      try {
        var data = JSON.parse(localStorage.getItem('math_app_data'));
        if (data && data.version) return data;
        return JSON.parse(JSON.stringify(DEFAULT_DATA));
      } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
    }

    function saveAppData(data) {
      localStorage.setItem('math_app_data', JSON.stringify(data));
    }

    function getUsers() {
      return getAppData().users;
    }

    function saveUsers(users) {
      var data = getAppData();
      data.users = users;
      saveAppData(data);
    }

    function addTestResult(testObj) {
      var data = getAppData();
      data.tests.push(testObj);
      saveAppData(data);
    }

    function getTopScores(lv, limit) {
      var data = getAppData();
      var scores = data.tests
        .filter(function(t) { return t.level === lv; })
        .map(function(t) {
          var mistakeCount = t.problems.filter(function(p) { return !p.correct; }).length;
          var timeSec = Math.floor((new Date(t.dateCompleted) - new Date(t.dateStarted)) / 1000);
          return { name: t.userId, mistakes: mistakeCount, time: timeSec, date: t.dateCompleted };
        });
      scores.sort(function(a, b) { return a.mistakes - b.mistakes || a.time - b.time; });
      return scores.slice(0, limit || 20);
    }

    function getSetting(key) {
      return getAppData().settings[key] || '';
    }

    function setSetting(key, value) {
      var data = getAppData();
      data.settings[key] = value;
      saveAppData(data);
    }

    function isAIEnabled() {
      return !!(getSetting('ApiKey') && getSetting('apiKeyValid'));
    }

    function updateAIVisibility() {
      var enabled = isAIEnabled();
      var teacherWrap = document.getElementById('ai-teacher-menu-wrap');
      if (teacherWrap) teacherWrap.style.display = enabled ? 'block' : 'none';
      var soloAI = document.getElementById('solo-ai-generate-wrap');
      if (soloAI) soloAI.style.display = enabled ? 'block' : 'none';
      // Re-render user list if it's visible (to show/hide AI buttons)
      var userMgmt = document.getElementById('user-management');
      if (userMgmt && userMgmt.style.display !== 'none') renderUserList();
    }

    // --- Problem generation ---

    function generateProblems() {
      var cfg = LEVELS[level];
      const list = [];
      for (let i = 0; i < TOTAL; i++) {
        let a, b, op, answer;
        if (cfg.type === 'mul') {
          a = randInt(cfg.minA || 1, cfg.maxA);
          b = randInt(cfg.minB || 1, cfg.maxB);
          op = '\u00d7';
          answer = a * b;
        } else if (cfg.type === 'div') {
          b = randInt(cfg.minDivisor || 1, cfg.maxDivisor);
          var quotient = randInt(1, Math.floor(cfg.maxDividend / b));
          a = b * quotient;
          op = '\u00f7';
          answer = quotient;
        } else if (cfg.type === 'divmod') {
          b = randInt(cfg.minDivisor || 2, cfg.maxDivisor);
          a = randInt(1, cfg.maxDividend);
          op = '\u00f7';
          answer = Math.floor(a / b);
          var remainder = a % b;
          list.push({ a: a, b: b, op: op, answer: answer, remainder: remainder });
          continue;
        } else {
          a = randInt(1, cfg.max);
          b = randInt(1, cfg.max);
          op = Math.random() < 0.5 ? '+' : '-';
          if (op === '-' && b > a) { [a, b] = [b, a]; }
          answer = op === '+' ? a + b : a - b;
        }
        list.push({ a: a, b: b, op: op, answer: answer });
      }
      return list;
    }

    function formatProblemString(p) {
      return p.a + ' ' + p.op + ' ' + p.b;
    }

    function formatCorrectAnswer(p) {
      if (typeof p.remainder !== 'undefined') return String(p.answer) + ' r ' + p.remainder;
      return String(p.answer);
    }

    function buildTestObject(userId, isComp) {
      var obj = {
        id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
        userId: userId,
        level: level,
        isCompetitionMode: isComp,
        competitionSessionId: isComp ? compSessionId : null,
        dateStarted: new Date(startTime).toISOString(),
        dateCompleted: new Date().toISOString(),
        problems: problems.map(function(p) {
          return {
            problem: formatProblemString(p),
            correctAnswer: formatCorrectAnswer(p),
            userAnswer: p.userAnswer || '',
            correct: !!p.correct,
            timeTaken: p.timeTaken || 0
          };
        })
      };
      if (aiTeacherMode) obj.isAiTeacher = true;
      return obj;
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return m + ':' + String(s).padStart(2, '0');
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('timer').textContent = formatTime(elapsed);
    }

    function hideAll() {
      ['menu','difficulty','comp-setup','game','done','handoff','comp-done','scoreboard','user-management','data-management','ai-teacher-dashboard','ai-teacher-loading','ai-teacher-eval'].forEach(function(id) {

      hideAll();
      document.getElementById('menu').style.display = 'block';

    function isDivmod() {
      return typeof problems[current].remainder !== 'undefined';
    }

    function showProblem() {
      problemStartTime = Date.now();
      const p = problems[current];
      document.getElementById('progress').textContent = (current + 1) + ' / ' + problems.length;
      document.getElementById('problem').textContent = p.a + ' ' + p.op + ' ' + p.b + ' = ?';
      const inp = document.getElementById('answer');
      inp.value = '';
      document.getElementById('result').textContent = '';
      var remWrap = document.getElementById('remainder-wrap');
      var remInp = document.getElementById('answer-remainder');
      if (isDivmod()) {
        remWrap.style.display = 'inline';
        remInp.value = '';
      } else {
        remWrap.style.display = 'none';
      }
      inp.focus();
      setTimeout(function() { inp.focus(); }, 50);
    }

    function runGame(label) {
      hideAll();
      document.getElementById('game').style.display = 'block';
      document.getElementById('player-label').textContent = label;
      current = 0;
      mistakes = 0;
      startTime = Date.now();
      clearInterval(timerInterval);
      document.getElementById('timer').textContent = '0:00';
      timerInterval = setInterval(updateTimer, 1000);
      showProblem();
    }

    function check() {
      var timeTaken = Math.round((Date.now() - problemStartTime) / 100) / 10;
      const val = parseInt(document.getElementById('answer').value);
      if (isNaN(val)) return;
      var remVal = 0;
      if (isDivmod()) {
        remVal = parseInt(document.getElementById('answer-remainder').value);
        if (isNaN(remVal)) return;
      }
      const el = document.getElementById('result');
      const p = problems[current];

      var correct;
      if (isDivmod()) {
        correct = val === p.answer && remVal === p.remainder;
      } else {
        correct = val === p.answer;
      }

      // Capture per-problem data
      p.timeTaken = timeTaken;
      p.correct = correct;
      if (isDivmod()) {
        p.userAnswer = String(val) + ' r ' + String(remVal);
      } else {
        p.userAnswer = String(val);
      }

      if (correct) {
        el.textContent = 'Correct!';
        el.className = 'result correct';
      } else {
        var rightAnswer = String(p.answer);
        if (isDivmod()) rightAnswer += ' r ' + p.remainder;
        mistakes++;
        el.textContent = 'Wrong \u2014 answer is ' + rightAnswer;
        el.className = 'result wrong';
      }

      current++;
      if (current < problems.length) {
        setTimeout(showProblem, 1000);
      } else {
        setTimeout(finish, 1000);
      }
    }

    function finish() {
      clearInterval(timerInterval);
      const elapsed = Math.floor((Date.now() - startTime) / 1000);

      if (mode === 'solo' && aiTeacherMode) {
        var testObj = buildTestObject(soloName, false);
        addTestResult(testObj);
        aiTeacherMode = false;
        aiTeacherFinish(testObj);
        return;
      }

      if (mode === 'solo') {
        var testObj = buildTestObject(soloName, false);
        addTestResult(testObj);
        var scores = getTopScores(level, 20);
        hideAll();
        document.getElementById('done').style.display = 'block';
        document.getElementById('summary').innerHTML =
          '<b>' + soloName + '</b><br>' +
          'Mistakes: <b>' + mistakes + '</b><br>' +
          'Time: <b>' + formatTime(elapsed) + '</b>';
        document.getElementById('personal-best').innerHTML =
          '<p><b>Top scores \u2013 ' + (LEVEL_LABELS[level] || level) + '</b></p>' +
          buildScoreTable(scores.slice(0, 5));

        // Show AI Evaluate button for AI-generated tests
        var evalWrap = document.getElementById('ai-evaluate-wrap');
        var evalDiv = document.getElementById('ai-evaluation');
        evalDiv.style.display = 'none';
        evalDiv.textContent = '';
        if (aiGeneratedTest && isAIEnabled()) {
          lastAITestObj = testObj;
          evalWrap.style.display = 'block';
          document.getElementById('ai-evaluate-btn').disabled = false;
          document.getElementById('ai-evaluate-btn').textContent = 'AI Evaluate';
        } else {
          evalWrap.style.display = 'none';
          lastAITestObj = null;
        }
        aiGeneratedTest = false;
      } else if (mode === 'comp') {
        // Save this player's test immediately (before player 2 overwrites problems)
        var currentPlayerIndex = playerResults.length;
        var testObj = buildTestObject(playerNames[currentPlayerIndex], true);
        addTestResult(testObj);
        playerResults.push({ mistakes: mistakes, time: elapsed });
        if (playerResults.length === 1) {
          hideAll();
          document.getElementById('handoff').style.display = 'block';
          document.getElementById('handoff-msg').innerHTML =
            '<b>' + playerNames[0] + '</b> is done!<br><br>' +
            'Hand the device to <b>' + playerNames[1] + '</b> and press Ready.';
          document.getElementById('handoff-btn').onclick = function() { startPlayer(1); };
        } else {
          showCompResults();
        }
      }
    }

    function showCompResults() {
      hideAll();
      document.getElementById('comp-done').style.display = 'block';
      const r1 = playerResults[0];
      const r2 = playerResults[1];

      document.getElementById('col1').textContent = playerNames[0];
      document.getElementById('col2').textContent = playerNames[1];

      const m1El = document.getElementById('m1');
      const m2El = document.getElementById('m2');
      const t1El = document.getElementById('t1');
      const t2El = document.getElementById('t2');

      m1El.textContent = r1.mistakes;
      m2El.textContent = r2.mistakes;
      t1El.textContent = formatTime(r1.time);
      t2El.textContent = formatTime(r2.time);

      let winner;
      if (r1.mistakes < r2.mistakes) winner = 0;
      else if (r2.mistakes < r1.mistakes) winner = 1;
      else if (r1.time < r2.time) winner = 0;
      else if (r2.time < r1.time) winner = 1;
      else winner = -1;

      m1El.className = r1.mistakes <= r2.mistakes ? 'winner-cell' : 'loser-cell';
      m2El.className = r2.mistakes <= r1.mistakes ? 'winner-cell' : 'loser-cell';
      t1El.className = r1.time <= r2.time ? 'winner-cell' : 'loser-cell';
      t2El.className = r2.time <= r1.time ? 'winner-cell' : 'loser-cell';

      const banner = document.getElementById('winner-banner');
      if (winner === -1) {
        banner.textContent = "It's a tie!";
      } else {
        banner.textContent = playerNames[winner] + ' wins!';
      }
    }

    // --- Mode launchers ---

    function buildStudentContext(userName) {
      var data = getAppData();
      var user = data.users.find(function(u) { return u.name === userName; });
      if (!user) return null;

      var userTests = data.tests
        .filter(function(t) { return t.userId === userName; })
        .sort(function(a, b) { return new Date(b.dateStarted) - new Date(a.dateStarted); })
        .slice(0, 20);

      var now = new Date();
      var age = now.getFullYear() - user.birthYear;
      if (user.birthMonth && now.getMonth() + 1 < user.birthMonth) age--;
      var ageStr = age > 0 ? ' (age ~' + age + ')' : '';

      var birthStr = '';
      if (user.birthMonth) birthStr += MONTH_NAMES[user.birthMonth - 1] + ' ';
      birthStr += user.birthYear;

      var lines = [];
      lines.push('## Student Profile');
      lines.push('- Name: ' + user.name);
      lines.push('- Birth: ' + birthStr + ageStr);
      lines.push('');

      if (userTests.length === 0) {
        lines.push('## No test history available.');
        lines.push('');
      } else {
        lines.push('## Recent Test History (most recent first)');
        lines.push('');
        userTests.forEach(function(t, ti) {
          var levelLabel = LEVEL_LABELS[t.level] || t.level;
          var modeStr = t.isCompetitionMode ? 'Competition' : 'Solo';
          var dateStr = t.dateStarted ? t.dateStarted.slice(0, 10) : 'unknown';
          lines.push('### Test ' + (ti + 1) + ': ' + levelLabel + ' (' + modeStr + ', ' + dateStr + ')');

          var correctCount = 0;
          var totalTime = 0;
          t.problems.forEach(function(p, pi) {
            var mark = p.correct ? '\u2713' : '\u2717';
            correctCount += p.correct ? 1 : 0;
            totalTime += (p.timeTaken || 0);
            lines.push('  ' + (pi + 1) + '. ' + p.problem + ' = ' + p.correctAnswer +
              ', answered ' + p.userAnswer + ' ' + mark + ' (' + (p.timeTaken || 0) + 's)');
          });
          var pct = t.problems.length > 0 ? Math.round(correctCount / t.problems.length * 100) : 0;
          var totalTimeSec = Math.round(totalTime);
          var totalTimeStr = Math.floor(totalTimeSec / 60) + ':' + String(totalTimeSec % 60).padStart(2, '0');
          lines.push('  Summary: ' + correctCount + '/' + t.problems.length + ' correct, ' + pct + '%, total time ' + totalTimeStr);
          lines.push('');
        });
      }

      return lines.join('\n');
    }

    function buildPromptText(userName) {
      var context = buildStudentContext(userName);
      if (!context) return null;

      var lines = [];
      lines.push('Generate a custom math test JSON file for a student based on their recent performance data.');
      lines.push('');
      lines.push(context);

      // Add generation-specific instructions if no history
      var data = getAppData();
      var userTests = data.tests.filter(function(t) { return t.userId === userName; });
      if (userTests.length === 0) {
        lines.push('Create a beginner-level assessment test with a mix of addition and subtraction problems appropriate for the student\'s age.');
        lines.push('');
      }

      lines.push('## Instructions');
      lines.push('Create a custom test that:');
      lines.push('1. Focuses on problem types where the student struggled (made mistakes or was slow)');
      lines.push('2. Includes a mix of easier problems for confidence and harder problems for growth');
      lines.push('3. Adjusts difficulty appropriately for the student\'s age and skill level');
      lines.push('4. Contains 10-15 problems');
      lines.push('');
      lines.push('Output ONLY a valid JSON file in this exact format:');
      lines.push('{');
      lines.push('  "name": "<descriptive test name>",');
      lines.push('  "problems": [');
      lines.push('    { "a": <integer>, "b": <integer>, "op": "<operator>" }');
      lines.push('  ]');
      lines.push('}');
      lines.push('');
      lines.push('Valid operators: "+" (addition), "-" (subtraction), "*" (multiplication), "/" (exact division), "/r" (division with remainder)');
      lines.push('Rules: b must be > 0 for division. For "/" the division must be exact (no remainder). For "/r" use any integers.');
      lines.push('Validation is strict: checks for valid operators, integer operands, division by zero, and exact divisibility for "/" (suggests "/r" if not even).');

      return lines.join('\n');
    }

    function buildEvaluationPrompt(userName, testObj) {
      var context = buildStudentContext(userName);
      if (!context) return null;

      var lines = [];
      lines.push('Evaluate a student\'s performance on an AI-generated math test.');
      lines.push('');

      // Student profile and historical performance (excludes the just-completed test since
      // buildStudentContext reads from saved data which already includes it — but that's fine,
      // the AI will see it in both sections and understand the context)
      lines.push(context);

      // Current test results
      lines.push('## AI-Generated Test Results');
      lines.push('Test name: ' + (LEVEL_LABELS[testObj.level] || testObj.level));
      lines.push('Date: ' + (testObj.dateStarted ? testObj.dateStarted.slice(0, 10) : 'today'));
      lines.push('');

      var correctCount = 0;
      var totalTime = 0;
      testObj.problems.forEach(function(p, pi) {
        var mark = p.correct ? '\u2713' : '\u2717';
        correctCount += p.correct ? 1 : 0;
        totalTime += (p.timeTaken || 0);
        lines.push('  ' + (pi + 1) + '. ' + p.problem + ' = ' + p.correctAnswer +
          ', answered ' + p.userAnswer + ' ' + mark + ' (' + (p.timeTaken || 0).toFixed(1) + 's)');
      });
      var pct = testObj.problems.length > 0 ? Math.round(correctCount / testObj.problems.length * 100) : 0;
      var totalTimeSec = Math.round(totalTime);
      var totalTimeStr = Math.floor(totalTimeSec / 60) + ':' + String(totalTimeSec % 60).padStart(2, '0');
      lines.push('  Summary: ' + correctCount + '/' + testObj.problems.length + ' correct, ' + pct + '%, total time ' + totalTimeStr);
      lines.push('');

      lines.push('## Instructions');
      lines.push('Based on the student\'s historical performance and today\'s test results, provide a brief evaluation (3-5 sentences) covering:');
      lines.push('1. How the student performed compared to their recent history \u2014 are they improving, staying the same, or struggling more?');
      lines.push('2. Specific strengths shown in this test (problem types answered quickly and correctly)');
      lines.push('3. Specific areas that need more practice (problem types with mistakes or slow response times)');
      lines.push('4. One concrete recommendation for what to focus on next');
      lines.push('');
      lines.push('Keep the language encouraging and age-appropriate. Address the evaluation to a parent or teacher, not directly to the student.');
      lines.push('Respond in plain text, not markdown.');

      return lines.join('\n');
    }

    function generateTestPrompt(userName) {
      var text = buildPromptText(userName);
      if (!text) { alert('User not found.'); return; }
      var blob = new Blob([text], { type: 'text/plain' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'test_prompt_' + userName.replace(/[^a-zA-Z0-9]/g, '_') + '.txt';
      a.click();
      URL.revokeObjectURL(url);
    }

    function generateAITest(userName) {
      var apiKey = getSetting('ApiKey');
      if (!apiKey) {
        alert('No API key configured. Please set your Google AI API key in the Data screen.');
        return;
      }
      var promptText = buildPromptText(userName);
      if (!promptText) { alert('User not found.'); return; }

      // Show loading state
      hideAll();
      document.getElementById('handoff').style.display = 'block';
      document.getElementById('handoff-msg').innerHTML =
        'Generating AI test for <b>' + userName + '</b>...<br><br>' +
        '<span style="color:#888;">Analyzing performance and creating personalized problems...</span>';
      document.getElementById('handoff-btn').style.display = 'none';

      var aiModel = getSetting('AiModel') || 'gemini-flash-latest';
      fetch('https://generativelanguage.googleapis.com/v1beta/models/' + encodeURIComponent(aiModel) + ':generateContent', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-goog-api-key': apiKey
        },
        body: JSON.stringify({
          contents: [{ parts: [{ text: promptText }] }]
        })
      })
      .then(function(response) {
        if (!response.ok) {
          return response.json().then(function(err) {
            throw new Error(err.error ? err.error.message : 'API request failed (HTTP ' + response.status + ')');
          });
        }
        return response.json();
      })
      .then(function(result) {
        var text = result.candidates && result.candidates[0] &&
          result.candidates[0].content && result.candidates[0].content.parts &&
          result.candidates[0].content.parts[0] && result.candidates[0].content.parts[0].text;
        if (!text) throw new Error('Empty response from AI.');

        // Extract JSON from response (may be wrapped in ```json ... ```)
        var jsonStr = text;
        var match = text.match(/```(?:json)?\s*([\s\S]*?)```/);
        if (match) jsonStr = match[1];
        jsonStr = jsonStr.trim();

        var testData;
        try {
          testData = JSON.parse(jsonStr);
        } catch(e) {
          throw new Error('Could not parse AI response as JSON.');
        }

        var validationError = validateCustomTest(testData);
        if (validationError) throw new Error('AI generated invalid test: ' + validationError);

        var convertedProblems = convertCustomProblems(testData);
        var testName = testData.name.trim();

        // Set up solo game with this test
        mode = 'solo';
        soloName = userName;
        level = 'custom:' + testName;
        problems = convertedProblems;
        aiGeneratedTest = true;

        // Show ready screen
        document.getElementById('handoff-msg').innerHTML =
          'AI test ready: <b>' + testName + '</b><br>' +
          '(' + problems.length + ' problems)<br><br>' +
          'Hand the device to <b>' + userName + '</b> and press Ready.';
        document.getElementById('handoff-btn').style.display = '';
        document.getElementById('handoff-btn').onclick = function() { runGame(''); };
      })
      .catch(function(err) {
        document.getElementById('handoff-msg').innerHTML =
          '<span style="color:red;">Error: ' + err.message + '</span>';
        document.getElementById('handoff-btn').style.display = '';
        document.getElementById('handoff-btn').textContent = 'Back to Menu';
        document.getElementById('handoff-btn').onclick = function() {
          document.getElementById('handoff-btn').textContent = 'Ready';
          showMenu();
        };
      });
    }

    function requestAIEvaluation() {
      if (!lastAITestObj) return;
      var apiKey = getSetting('ApiKey');
      if (!apiKey) { alert('No API key configured.'); return; }

      var promptText = buildEvaluationPrompt(lastAITestObj.userId, lastAITestObj);

    function buildAITeacherPrompt(userName, isInitial) {
      var context = buildStudentContext(userName);
      if (!context) return null;

      var td = getAITeacherData(userName);
      var aiTests = getAITeacherTests(userName).slice(0, 10);

      var lines = [];
      lines.push('You are an AI math teacher. Generate a custom math test for a student and provide a structured assessment.');
      lines.push('');
      lines.push(context);

      if (td && td.gradeLevel) {
        lines.push('## Current AI Teacher Assessment');
        lines.push('- Grade Level: ' + td.gradeLevel);

          lines.push('- Addition: ' + (td.skills.addition || 'Not started'));
          lines.push('- Subtraction: ' + (td.skills.subtraction || 'Not started'));
          lines.push('- Multiplication: ' + (td.skills.multiplication || 'Not started'));
          lines.push('- Division: ' + (td.skills.division || 'Not started'));
        }
        lines.push('');
      }

      if (aiTests.length > 0) {
        lines.push('## AI Teacher Test History (most recent first)');

          lines.push('  Summary: ' + correctCount + '/' + t.problems.length + ' correct, ' + pct + '%, total time ' + totalTimeStr);
          lines.push('');

      lines.push('## Instructions');

      } else {
        lines.push('Create a practice test that:');

        lines.push('3. Adjusts difficulty appropriately for the student\'s current level');

      lines.push('Validation is strict: checks for valid operators, integer operands, division by zero, and exact divisibility for "/" (suggests "/r" if not even).');

      var totalTimeStr = Math.floor(totalTimeSec / 60) + ':' + String(totalTimeSec % 60).padStart(2, '0');
      lines.push('  Summary: ' + correctCount + '/' + testObj.problems.length + ' correct, ' + pct + '%, total time ' + totalTimeStr);
      lines.push('');

      lines.push('Provide an evaluation and updated level assessment. Output ONLY valid JSON in this exact format:');
      lines.push('{');
      lines.push('  "evaluation": "<3-5 sentences: performance analysis, strengths, areas to improve, recommendation. Encouraging and age-appropriate. Address parent/teacher, not student.>",');
      lines.push('  "gradeLevel": "<approximate school grade, e.g. Grade 1, Grade 2, Grade 3... up to Grade 8>",');

    function aiTeacherGenerateTest(isInitial) {
      var apiKey = getSetting('ApiKey');
      if (!apiKey) { alert('No API key configured.'); return; }

      var promptText = buildAITeacherPrompt(aiTeacherUser, isInitial);
      if (!promptText) { alert('Could not build prompt.'); return; }

      hideAll();
      document.getElementById('ai-teacher-loading').style.display = 'block';
      document.getElementById('ai-teacher-loading-msg').textContent =
        isInitial ? 'Generating initial assessment...' : 'Generating next test...';

      var aiModel = getSetting('AiModel') || 'gemini-flash-latest';
      fetch('https://generativelanguage.googleapis.com/v1beta/models/' + encodeURIComponent(aiModel) + ':generateContent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
        body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
      })
      .then(function(response) {
        if (!response.ok) {
          return response.json().then(function(err) {
            throw new Error(err.error ? err.error.message : 'API error (HTTP ' + response.status + ')');
          });
        }
        return response.json();
      })
      .then(function(result) {
        var text = result.candidates && result.candidates[0] &&
          result.candidates[0].content && result.candidates[0].content.parts &&
          result.candidates[0].content.parts[0] && result.candidates[0].content.parts[0].text;
        if (!text) throw new Error('Empty response from AI.');

        var jsonStr = text;
        var match = text.match(/```(?:json)?\s*([\s\S]*?)```/);
        if (match) jsonStr = match[1];
        jsonStr = jsonStr.trim();

        var testData = JSON.parse(jsonStr);
        var validationError = validateCustomTest(testData);
        if (validationError) throw new Error('AI generated invalid test: ' + validationError);

        var convertedProblems = convertCustomProblems(testData);
        var testName = testData.name.trim();

        // Set up game state
        mode = 'solo';
        soloName = aiTeacherUser;
        level = 'custom:' + testName;
        problems = convertedProblems;
        aiTeacherMode = true;
        aiGeneratedTest = false; // Don't show the old evaluate button

        // Go directly to the game
        runGame(aiTeacherUser);
      })
      .catch(function(err) {
        alert('Error: ' + err.message);
        showAITeacherDashboard(aiTeacherUser);
      });
    }

    function buildScoreTable(scores) {

      scores.forEach(function(s, i) {

    function buildUserLeaderboard() {
      var data = getAppData();
      if (data.tests.length === 0) return '<p style="color:#999;">No tests completed yet.</p>';
      var stats = {};
      data.tests.forEach(function(t) {
        if (!stats[t.userId]) {
          stats[t.userId] = { correct: 0, incorrect: 0, timeCorrect: 0, timeIncorrect: 0 };
        }
        var s = stats[t.userId];
        t.problems.forEach(function(p) {
          if (p.correct) {
            s.correct++;
            s.timeCorrect += (p.timeTaken || 0);
          } else {
            s.incorrect++;
            s.timeIncorrect += (p.timeTaken || 0);
          }
        });
      });
      var rows = Object.keys(stats).map(function(userId) {
        var s = stats[userId];
        var total = s.correct + s.incorrect;
        var pct = total > 0 ? Math.round(s.correct / total * 100) : 0;
        var avgCorrect = s.correct > 0 ? Math.round(s.timeCorrect / s.correct * 10) / 10 : 0;
        var avgIncorrect = s.incorrect > 0 ? Math.round(s.timeIncorrect / s.incorrect * 10) / 10 : 0;
        return { name: userId, correct: s.correct, total: total, pct: pct, avgCorrect: avgCorrect, avgIncorrect: avgIncorrect };
      });
      rows.sort(function(a, b) { return b.correct - a.correct; });
      var h = '<table class="score-table"><tr><th>#</th><th>Name</th><th>Correct</th><th>%</th><th>Avg correct</th><th>Avg incorrect</th></tr>';
      rows.forEach(function(r, i) {
        h += '<tr><td>' + (i + 1) + '</td><td>' + r.name + '</td><td>' + r.correct + '/' + r.total +
          '</td><td>' + r.pct + '%</td><td>' + r.avgCorrect + 's</td><td>' +
          (r.avgIncorrect > 0 ? r.avgIncorrect + 's' : '\u2014') + '</td></tr>';
      });
      h += '</table>';
      return h;
    }

        }
      });
      // Populate month dropdown for add user
      var monthSel = document.getElementById('comp-new-user-month');
      monthSel.innerHTML = '<option value="">Month</option>';
      MONTH_NAMES.forEach(function(m, i) {
        monthSel.innerHTML += '<option value="' + (i + 1) + '">' + m + '</option>';
      });
      // Populate year dropdown for add user
      var yearSel = document.getElementById('comp-new-user-year');
      yearSel.innerHTML = '<option value="">Year</option>';
      var curYear = new Date().getFullYear();
      for (var y = curYear; y >= curYear - 25; y--) {
        yearSel.innerHTML += '<option value="' + y + '">' + y + '</option>';
      }
      document.getElementById('comp-new-user-name').value = '';
      document.getElementById('comp-add-user-btn').style.display = '';
      document.getElementById('comp-add-user-form').style.display = 'none';
      document.getElementById('comp-setup').style.display = 'block';
    }

    function addCompUser() {
      var name = document.getElementById('comp-new-user-name').value.trim();
      var month = parseInt(document.getElementById('comp-new-user-month').value);
      var year = parseInt(document.getElementById('comp-new-user-year').value);
      if (!name) { alert('Please enter a name.'); return; }
      if (!month || !year) { alert('Please select month and year of birth.'); return; }
      var users = getUsers();
      var existing = users.find(function(u) { return u.name.toLowerCase() === name.toLowerCase(); });
      if (existing) { alert('A user with this name already exists.'); return; }
      users.push({ id: name, name: name, dateCreated: new Date().toISOString(), birthMonth: month, birthYear: year });
      users.sort(function(a, b) { return a.name.localeCompare(b.name); });
      saveUsers(users);
      // Add to dropdown and select
      var sel = document.getElementById('comp-user-select-2');
      var opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
      sel.value = name;
      document.getElementById('comp-new-user-name').value = '';
      document.getElementById('comp-new-user-month').value = '';
      document.getElementById('comp-new-user-year').value = '';
      document.getElementById('comp-add-user-form').style.display = 'none';
      document.getElementById('comp-add-user-btn').style.display = '';
    }

    function startComp() {
      var n1 = getSelectedUser();
      const n2 = document.getElementById('comp-user-select-2').value;
      if (!n1 || !n2) { alert('Please select a competitor.'); return; }
      if (n1 === n2) { alert('Please select a different competitor.'); return; }
      playerNames = [n1, n2];
      playerResults = [];
      mode = 'comp';
      hideAll();
      document.getElementById('difficulty').style.display = 'block';
    }

    function pickLevel(lv) {
      level = lv;
      problems = generateProblems();
      if (mode === 'comp') {
        compSessionId = 'comp-' + new Date().toISOString();
      }
      if (mode === 'solo') {
        runGame('');
      } else {
        hideAll();
        document.getElementById('handoff').style.display = 'block';
        document.getElementById('handoff-msg').innerHTML =
          'Hand the device to <b>' + playerNames[0] + '</b> and press Ready.';
        document.getElementById('handoff-btn').onclick = function() { startPlayer(0); };
      }
    }

    function startPlayer(index) {
      runGame(playerNames[index]);
    }

    // --- Custom test loading ---

    var OP_MAP = {
      '+':  { op: '+',       fn: function(a, b) { return { answer: a + b }; } },
      '-':  { op: '\u2212',  fn: function(a, b) { return { answer: a - b }; } },
      '*':  { op: '\u00d7',  fn: function(a, b) { return { answer: a * b }; } },
      '/':  { op: '\u00f7',  fn: function(a, b) { return { answer: a / b }; } },
      '/r': { op: '\u00f7',  fn: function(a, b) { return { answer: Math.floor(a / b), remainder: a % b }; } }
    };

    function validateCustomTest(data) {
      if (!data || typeof data !== 'object') return 'File does not contain a valid JSON object.';
      if (typeof data.name !== 'string' || !data.name.trim()) return 'Missing or empty "name" field.';
      if (!Array.isArray(data.problems) || data.problems.length === 0) return 'Missing or empty "problems" array.';
      var validOps = Object.keys(OP_MAP);
      for (var i = 0; i < data.problems.length; i++) {
        var p = data.problems[i];
        var num = 'Problem ' + (i + 1) + ': ';
        if (typeof p.a !== 'number' || typeof p.b !== 'number') return num + '"a" and "b" must be numbers.';
        if (!Number.isInteger(p.a) || !Number.isInteger(p.b)) return num + '"a" and "b" must be integers.';
        if (typeof p.op !== 'string' || validOps.indexOf(p.op) === -1) return num + '"op" must be one of: ' + validOps.join(', ');
        if (p.b === 0 && (p.op === '/' || p.op === '/r')) return num + 'division by zero (b = 0).';
        if (p.op === '/' && p.a % p.b !== 0) return num + 'not evenly divisible (' + p.a + ' / ' + p.b + '). Use "/r" for remainder.';
      }
      return null;
    }

    function convertCustomProblems(data) {
      return data.problems.map(function(p) {
        var mapping = OP_MAP[p.op];
        var result = mapping.fn(p.a, p.b);
        var prob = { a: p.a, b: p.b, op: mapping.op, answer: result.answer };
        if (typeof result.remainder !== 'undefined') prob.remainder = result.remainder;
        return prob;
      });
    }

    function loadCustomTest(event) {
      var file = event.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var data = JSON.parse(e.target.result);
          var error = validateCustomTest(data);
          if (error) { alert('Invalid custom test:\n' + error); return; }
          customTestName = data.name.trim();
          customTestProblems = convertCustomProblems(data);
          document.getElementById('custom-test-name').textContent =
            'Loaded: ' + customTestName + ' (' + customTestProblems.length + ' problems)';
          document.getElementById('custom-test-start').style.display = 'block';
        } catch(err) {
          alert('Error reading file: ' + err.message);
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    function pickCustomTest() {
      if (!customTestProblems) { alert('No custom test loaded.'); return; }
      level = 'custom:' + customTestName;
      problems = customTestProblems.map(function(p) { return Object.assign({}, p); });
      if (mode === 'comp') {
        compSessionId = 'comp-' + new Date().toISOString();
      }
      if (mode === 'solo') {
        runGame('');
      } else {
        hideAll();
        document.getElementById('handoff').style.display = 'block';
        document.getElementById('handoff-msg').innerHTML =
          'Hand the device to <b>' + playerNames[0] + '</b> and press Ready.';
        document.getElementById('handoff-btn').onclick = function() { startPlayer(0); };
      }
    }

    function showDataManagement() {
      hideAll();
      document.getElementById('data-management').style.display = 'block';
      document.getElementById('api-key-input').value = getSetting('ApiKey');
      document.getElementById('ai-model-input').value = getSetting('AiModel') || '';
      document.getElementById('api-key-status').textContent = '';
    }

    function saveAISettings() {
      var key = document.getElementById('api-key-input').value.trim();
      var model = document.getElementById('ai-model-input').value.trim();
      setSetting('ApiKey', key);
      setSetting('AiModel', model);
      var statusEl = document.getElementById('api-key-status');

      if (!key) {
        setSetting('apiKeyValid', '');
        statusEl.textContent = 'Saved (no key set).';
        statusEl.style.color = '#888';
        updateAIVisibility();
        return;
      }

      statusEl.textContent = 'Verifying...';
      statusEl.style.color = '#888';

      var aiModel = model || 'gemini-flash-latest';
      fetch('https://generativelanguage.googleapis.com/v1beta/models/' + encodeURIComponent(aiModel) + ':generateContent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': key },
        body: JSON.stringify({ contents: [{ parts: [{ text: 'Say hi' }] }] })
      })
      .then(function(response) {
        if (!response.ok) {
          return response.json().then(function(err) {
            var msg = err.error ? err.error.message : 'HTTP ' + response.status;
            throw new Error(msg);
          });
        }
        return response.json();
      })
      .then(function(result) {
        var text = result.candidates && result.candidates[0] &&
          result.candidates[0].content && result.candidates[0].content.parts &&
          result.candidates[0].content.parts[0] && result.candidates[0].content.parts[0].text;
        if (!text) throw new Error('Empty response');
        setSetting('apiKeyValid', '1');
        statusEl.textContent = 'Saved \u2013 API key and model verified \u2713';
        statusEl.style.color = '#2a9d2a';
        updateAIVisibility();
      })
      .catch(function(err) {
        setSetting('apiKeyValid', '');
        statusEl.textContent = 'Saved \u2013 verification failed: ' + err.message;
        statusEl.style.color = '#e55';
        updateAIVisibility();
      });
    }

    // --- Export / Import ---

    function exportData() {
      var data = getAppData();
      var exportObj = JSON.parse(JSON.stringify(data));
      exportObj.exportedAt = new Date().toISOString();
      var blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'math_app_data_' + new Date().toISOString().slice(0, 10) + '.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(event) {
      var file = event.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var data = JSON.parse(e.target.result);
          if (!data.version || !Array.isArray(data.users) || !Array.isArray(data.tests)) {
            alert('Invalid file format.');
            return;
          }
          if (!confirm('This will replace all current data. Continue?')) return;
          delete data.exportedAt;
          if (!data.settings || typeof data.settings !== 'object') {
            data.settings = { ApiKey: '' };
          }
          saveAppData(data);
          renderUserList();
          alert('Data imported successfully.');
        } catch(err) {
          alert('Error reading file: ' + err.message);
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // --- Keyboard handlers ---

    document.getElementById('answer').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        if (isDivmod()) {
          document.getElementById('answer-remainder').focus();
        } else {
          check();
        }
      }
    });

    document.getElementById('answer-remainder').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') check();
    });
  </script>
</body>
