function buildStudentHistoryPrompt(topicId, userName, questionMap) {
  var allResults = getTestResults().filter(function(r) { return r.user === userName && r.topicId === topicId; });
  if (!allResults.length) return '';

  // Sort by date descending, take last 5
  allResults.sort(function(a, b) { return b.date.localeCompare(a.date); });
  var recent = allResults.slice(0, 5);

  var historyText = '';
  recent.forEach(function(r, idx) {
    var daysAgo = Math.round((Date.now() - new Date(r.date).getTime()) / 86400000);
    var daysLabel = daysAgo === 0 ? 'today' : (daysAgo === 1 ? 'yesterday' : daysAgo + ' days ago');
    var purpose = r.testFile && r.testFile.indexOf('diag') >= 0 ? 'Diagnostic' : (r.testFile && r.testFile.indexOf('ai-practice') >= 0 ? 'Practice (AI)' : 'Practice');

    historyText += '#### Session ' + (recent.length - idx) + ' — ' + purpose + ' (' + daysLabel + ')\n';
    historyText += 'Test: ' + (r.testTitle || r.testId || 'Unknown') + '\n';

    // Try to get duration from attemptData
    var duration = '';
    if (r.attemptData && r.attemptData.test_attempt && r.attemptData.test_attempt.timing) {
      var secs = r.attemptData.test_attempt.timing.duration_seconds;
      if (secs) duration = Math.round(secs / 60) + ' minutes';
    }
    if (duration) historyText += 'Duration: ' + duration + '\n';
    historyText += 'Status: completed\n';
    historyText += 'Questions answered:\n';

    // Format each question from details + attemptData
    var responses = {};
    if (r.attemptData && r.attemptData.test_attempt && r.attemptData.test_attempt.question_responses) {
      r.attemptData.test_attempt.question_responses.forEach(function(qr) {
        responses[qr.question_id] = qr;
      });
    }

    var evalResults = {};
    if (r.evaluationData && r.evaluationData.test_evaluation && r.evaluationData.test_evaluation.question_results) {
      r.evaluationData.test_evaluation.question_results.forEach(function(qr) {
        evalResults[qr.question_id] = qr;
      });
    }

    if (r.details && r.details.length) {
      r.details.forEach(function(d, qi) {
        // Try to find question ID from evaluation data
        var qId = null;
        var responseKeys = Object.keys(responses);
        if (responseKeys[qi]) qId = responseKeys[qi];
        if (!qId) {
          var evalKeys = Object.keys(evalResults);
          if (evalKeys[qi]) qId = evalKeys[qi];
        }

        // Normalise to qb_ for the prompt; look up in questionMap (which uses qb_ keys)
        var bankId = qId ? (qId.indexOf('qb_') === 0 ? qId : qId.replace(/^q_/, 'qb_')) : 'unknown';
        var qEntry = questionMap[bankId] || (qId ? questionMap[qId] : null);

        // Get tags from questionMap
        var tags = [];
        if (qEntry && qEntry.tags) tags = qEntry.tags;

        var answerType = '';
        if (qEntry) answerType = qEntry.answer_type || '';

        var difficulty = '';
        if (qEntry) difficulty = qEntry.difficulty || '';

        var timeSpent = '';
        if (qId && responses[qId] && responses[qId].time_spent_seconds) {
          timeSpent = responses[qId].time_spent_seconds + 's';
        }

        var isCorrect = d.status === 'correct';
        var scoreVal = d.score;

        historyText += '  - ' + bankId;
        if (tags.length) historyText += ' | ' + tags.join(', ');
        if (difficulty) historyText += ' | difficulty ' + difficulty;
        if (answerType) historyText += ' | ' + answerType;
        historyText += '\n';

        var answerDisplay = d.answerDisplay || d.answer || '—';
        if (typeof answerDisplay === 'object') answerDisplay = JSON.stringify(answerDisplay);
        historyText += '    Answer: ' + answerDisplay + ' | Correct: ' + (scoreVal >= 1 ? 'true' : (scoreVal > 0 ? 'partial (score: ' + scoreVal + ')' : 'false')) + '\n';
        if (timeSpent) historyText += '    Time: ' + timeSpent + '\n';
      });
    }

    historyText += 'Evaluation summary:\n';
    historyText += '  Score: ' + r.score + '% (weighted)\n';

    // Tag-based summary
    if (r.details && r.details.length) {
      var tagStats = {};
      r.details.forEach(function(d, qi) {
        var qId = null;
        var responseKeys = Object.keys(responses);
        if (responseKeys[qi]) qId = responseKeys[qi];
        var tags = (qId && questionMap[qId] && questionMap[qId].tags) ? questionMap[qId].tags : [];
        tags.forEach(function(tag) {
          if (!tagStats[tag]) tagStats[tag] = { correct: 0, total: 0 };
          tagStats[tag].total++;
          if (d.status === 'correct') tagStats[tag].correct++;
        });
      });
      if (Object.keys(tagStats).length) {
        historyText += '  By tag:\n';
        Object.keys(tagStats).forEach(function(tag) {
          var s = tagStats[tag];
          var pct = Math.round(s.correct / s.total * 100);
          historyText += '    ' + tag + ': ' + s.correct + '/' + s.total + ' correct (' + pct + '%)\n';
        });
      }
    }

    // Include prior AI evaluation if available
    if (r.aiEvaluation) {
      historyText += '  AI evaluation:\n';
      if (r.aiEvaluation.overall && r.aiEvaluation.overall.en) {
        historyText += '    Overall: ' + r.aiEvaluation.overall.en + '\n';
      }
      if (r.aiEvaluation.strengths) {
        historyText += '    Strengths: ' + r.aiEvaluation.strengths.map(function(s) { return s.en || ''; }).filter(Boolean).join('; ') + '\n';
      }
      if (r.aiEvaluation.improvements) {
        historyText += '    Improvements needed: ' + r.aiEvaluation.improvements.map(function(s) { return s.en || ''; }).filter(Boolean).join('; ') + '\n';
      }
    }

    historyText += '\n';
  });

  return historyText;
}

function callGeminiForTestGeneration(systemPrompt, userPrompt) {
  var apiKey = getSetting('ApiKey');
  var aiModel = getAiModel();

  return fetch('https://generativelanguage.googleapis.com/v1beta/models/' + encodeURIComponent(aiModel) + ':generateContent', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
    body: JSON.stringify({
      systemInstruction: { parts: [{ text: systemPrompt }] },
      contents: [{ parts: [{ text: userPrompt }] }],
      generationConfig: {
        temperature: 0.7,
        responseMimeType: 'application/json'
      }
    })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (!data.candidates || !data.candidates[0]) {
      throw new Error('No response from AI: ' + JSON.stringify(data.error || data));
    }
    var text = data.candidates[0].content.parts[0].text;
    // Parse JSON from response
    try {
      return JSON.parse(text);
    } catch(e) {
      // Try to extract JSON from markdown code blocks
      var match = text.match(/\{[\s\S]*\}/);
      if (match) return JSON.parse(match[0]);
      throw new Error('Could not parse AI response as JSON');
    }
  });
}

function processAITestResponse(aiResponse, questionMap, mediaMap, topicId, testLocale, uiLang) {
  var plan = aiResponse.test_plan;
  if (!plan || !plan.sections) return null;

  // Collect all question IDs from sections
  var allQIds = [];
  plan.sections.forEach(function(s) {
    (s.question_ids || []).forEach(function(id) {
      if (allQIds.indexOf(id) === -1) allQIds.push(id);
    });
  });

  if (!allQIds.length) return null;

  // Look up questions in the question bank map
  var questions = [];
  var usedMedia = {};
  allQIds.forEach(function(bankId) {
    var src = questionMap[bankId];
    if (!src) return; // Skip unknown question IDs

    // Deep copy the question
    var q = JSON.parse(JSON.stringify(src));
    questions.push(q);

    // Track media
    if (q.media_refs) {
      q.media_refs.forEach(function(mId) {
        if (mediaMap[mId]) usedMedia[mId] = mediaMap[mId];
      });
    }
  });

  if (!questions.length) return null;

  // Build sections
  var sections = plan.sections.map(function(s, i) {
    return {
      id: 'section_' + String(i + 1).padStart(3, '0'),
      title: s.title || null,
      description: s.description || null,
      instructions: s.instructions || null,
      question_ids: (s.question_ids || []),
      shuffle_questions: s.shuffle_questions || false,
      time_limit_seconds: s.time_limit_seconds || null
    };
  });

  // Build media array
  var media = [];
  Object.keys(usedMedia).forEach(function(mId) {
    media.push(usedMedia[mId]);
  });

  // Build settings
  var settings = plan.settings || {};

  // Build the test definition
  var testDef = {
    test: {
      id: 'ai_practice_' + topicId + '_' + Date.now(),
      default_locale: testLocale,
      supported_locales: testLocale === 'en' ? ['en'] : [testLocale, 'en'],
      title: plan.title || { en: 'AI Practice' },
      description: plan.description || null,
      instructions: plan.instructions || null,
      version: 1,
      status: 'generated',
      tags: plan.tags || ['ai-practice'],
      created_by: 'ai',
      created_at: new Date().toISOString(),
      media: media,
      sections: sections,
      questions: questions,
      settings: {
        default_time_limit_seconds: settings.default_time_limit_seconds || null,
        shuffle_questions: settings.shuffle_questions || false,
        allow_skip: settings.allow_skip !== false,
        show_hints: settings.show_hints !== false,
        show_correct_answer_comment: settings.show_correct_answer_comment !== false
      }
    }
  };

  return testDef;
}

// ── Test Engine ──────────────────────────────────────────────────────────────
var testState = null; // { questions, answers, currentIndex, locale, mediaMap, sectionMap, timer }

function startTest() {
  var t = currentTest.test;
  var locale = getUserTestLang();
  var transLocale = getTranslationLocale(locale);

  // Build ordered question list (respecting sections or flat)
  var orderedQuestions = buildQuestionOrder(t);

  // Build media lookup
  var mediaMap = {};
  if (t.media && Array.isArray(t.media)) {
    t.media.forEach(function(m) { mediaMap[m.id] = m; });
  }

  // Build section lookup for each question
  var sectionMap = {};
  if (t.sections && Array.isArray(t.sections)) {
    t.sections.forEach(function(s) {
      if (s.question_ids) {
        s.question_ids.forEach(function(qid) {
          sectionMap[qid] = s;
        });
      }
    });
  }

  // Initialise answers array
  var answers = orderedQuestions.map(function() { return null; });

  testState = {
    questions: orderedQuestions,
    answers: answers,
    currentIndex: 0,
    locale: locale,
    translationLocale: transLocale,
    mediaMap: mediaMap,
    sectionMap: sectionMap,
    settings: t.settings || {},
    timer: null,
    timerSeconds: 0,
    timerLimit: (t.settings && t.settings.default_time_limit_seconds) || null,
    // Attempt tracking
    startedAt: new Date().toISOString(),
    navigationPath: [],
    questionEvents: {},    // keyed by question id
    questionTimers: {}     // track time per question
  };

  // Init per-question event arrays
  orderedQuestions.forEach(function(q) {
    testState.questionEvents[q.id] = [];
  });

  showTestScreen();
}

function buildQuestionOrder(t) {
  var questions;

  if (t.sections && t.sections.length > 0) {
    // Use section ordering
    var qById = {};
    t.questions.forEach(function(q) { qById[q.id] = q; });

    questions = [];
    t.sections.forEach(function(s) {
      var sectionQs = (s.question_ids || []).map(function(id) { return qById[id]; }).filter(Boolean);
      if (s.shuffle_questions) sectionQs = shuffle(sectionQs);
      questions = questions.concat(sectionQs);
    });

    // Add any questions not in any section
    var inSection = {};
    t.sections.forEach(function(s) {
      (s.question_ids || []).forEach(function(id) { inSection[id] = true; });
    });
    t.questions.forEach(function(q) {
      if (!inSection[q.id]) questions.push(q);
    });
  } else {
    questions = t.questions.slice();
    if (t.settings && t.settings.shuffle_questions) questions = shuffle(questions);
  }

  return questions;
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function showTestScreen() {
  hideAll();
  document.getElementById('test-screen').style.display = 'block';

  // Start timer if time limited
  if (testState.timerLimit) {
    testState.timerSeconds = testState.timerLimit;
    startTimer();
  }

  renderQuestion();
}

function confirmQuitTest() {
  if (confirm(tr('quitTestConfirm'))) {
    stopTimer();
    testState = null;
    showMenu();
  }
}

// ── Timer ────────────────────────────────────────────────────────────────────
function startTimer() {
  var el = document.getElementById('test-timer');
  el.style.display = 'block';
  updateTimerDisplay();
  testState.timer = setInterval(function() {
    testState.timerSeconds--;
    updateTimerDisplay();
    if (testState.timerSeconds <= 0) {
      stopTimer();
      finishTest();
    }
  }, 1000);
}

function stopTimer() {
  if (testState && testState.timer) {
    clearInterval(testState.timer);
    testState.timer = null;
  }
  document.getElementById('test-timer').style.display = 'none';
}

function updateTimerDisplay() {
  var el = document.getElementById('test-timer');
  var s = testState.timerSeconds;
  var m = Math.floor(s / 60);
  var sec = s % 60;
  el.textContent = m + ':' + (sec < 10 ? '0' : '') + sec;
  el.className = 'timer-display' + (s <= 60 ? ' warning' : '');
}

// ── Translation Toggle ──────────────────────────────────────────────────────
var translationCounter = 0;

function makeTranslateBtnMulti(locObjs, element) {
  // Creates one translate button that reveals translations for multiple localized objects
  if (!testState || !testState.translationLocale) return '';
  var parts = [];
  locObjs.forEach(function(obj) {
    if (!obj) return;
    var t = locStr(obj, testState.translationLocale);
    if (t) parts.push(t);
  });
  if (parts.length === 0) return '';
  var id = 'trans-' + (++translationCounter);
  var elemType = element || 'question_text';
  var content = parts.map(function(p) { return '<p>' + escHtml(p) + '</p>'; }).join('');
  return ' <button class="btn-translate" onclick="event.stopPropagation(); toggleTranslation(\'' + id + '\',\'' + elemType + '\')">' +
    escHtml(tr('translate')) + '</button>' +
    '<div class="translated-text" id="' + id + '" style="display:none;">' + content + '</div>';
}

function makeTranslateBtnOptions(options, locale) {
  // Creates one translate button that reveals translations for all answer options
  if (!testState || !testState.translationLocale) return '';
  var parts = [];
  options.forEach(function(opt) {
    var t = locStr(opt.text, testState.translationLocale);
    var orig = locStr(opt.text, locale);
    if (t && t !== orig) parts.push(orig + ' = ' + t);
    else if (t) parts.push(t);
  });
  if (parts.length === 0) return '';
  var id = 'trans-' + (++translationCounter);
  var content = parts.map(function(p) { return '<p>' + escHtml(p) + '</p>'; }).join('');
  return '<div style="margin:8px 0 4px;"><button class="btn-translate" onclick="event.stopPropagation(); toggleTranslation(\'' + id + '\',\'option\')">' +
    escHtml(tr('translate')) + '</button>' +
    '<div class="translated-text" id="' + id + '" style="display:none;">' + content + '</div></div>';
}

function toggleTranslation(id, element) {
  var el = document.getElementById(id);
  if (!el) return;
  var showing = el.style.display === 'none';
  el.style.display = showing ? 'block' : 'none';
  if (showing && testState) {
    var q = testState.questions[testState.currentIndex];
    trackEvent(q.id, 'translation_requested', {
      element: element || 'question_text',
      from_locale: testState.locale,
      to_locale: testState.translationLocale
    });
  }
}

// ── Question Rendering ──────────────────────────────────────────────────────
function trackEvent(qId, type, detail) {
  if (!testState || !testState.questionEvents[qId]) return;
  var evt = { type: type, timestamp: new Date().toISOString() };
  if (detail) evt.detail = detail;
  testState.questionEvents[qId].push(evt);
}

function exitCurrentQuestion() {
  if (!testState) return;
  var q = testState.questions[testState.currentIndex];
  trackEvent(q.id, 'question_exited');
  // Accumulate time spent
  if (testState.questionTimers[q.id]) {
    if (!testState.questionTimers[q.id].total) testState.questionTimers[q.id].total = 0;
    testState.questionTimers[q.id].total += (Date.now() - testState.questionTimers[q.id].entered) / 1000;
  }
}

function renderQuestion() {
  var idx = testState.currentIndex;
  var total = testState.questions.length;
  var q = testState.questions[idx];
  var locale = testState.locale;

  // Track navigation — only on actual question change
  var lastNav = testState.navigationPath[testState.navigationPath.length - 1];
  if (lastNav !== q.id) {
    testState.navigationPath.push(q.id);
    trackEvent(q.id, 'question_displayed');
    testState.questionTimers[q.id] = testState.questionTimers[q.id] || { total: 0 };
    testState.questionTimers[q.id].entered = Date.now();
  }

  // Progress
  document.getElementById('progress-fill').style.width = ((idx + 1) / total * 100) + '%';
  document.getElementById('progress-text').textContent = trFmt('questionOf', idx + 1, total);

  // Section header — only show at the first question of a new section
  var sectionArea = document.getElementById('section-header-area');
  var section = testState.sectionMap[q.id];
  var prevSection = idx > 0 ? testState.sectionMap[testState.questions[idx - 1].id] : null;
  var isNewSection = section && (!prevSection || prevSection.id !== section.id);
  if (isNewSection) {
    var secTransObjs = [section.title];
    if (section.instructions) secTransObjs.push(section.instructions);
    var sh = '<div class="section-header"><h3>' + escHtml(locStr(section.title, locale)) + makeTranslateBtnMulti(secTransObjs, 'section_title') + '</h3>';
    if (section.instructions) {
      sh += '<p>' + escHtml(locStr(section.instructions, locale)) + '</p>';
    }
    sh += '</div>';
    sectionArea.innerHTML = sh;
  } else {
    sectionArea.innerHTML = '';
  }

  // Build question area
  var html = '';

  // Media
  if (q.media_refs && q.media_refs.length > 0) {
    html += renderMediaRefs(q.media_refs, locale);
  }

  // Question text + combined translate button for question and hint
  var qTransObjs = [q.text];
  if (testState.settings.show_hints && q.feedback && q.feedback.hint) {
    qTransObjs.push(q.feedback.hint);
  }
  html += '<div class="question-text">' + escHtml(locStr(q.text, locale)) + makeTranslateBtnMulti(qTransObjs) + '</div>';

  // Hint
  if (testState.settings.show_hints && q.feedback && q.feedback.hint) {
    html += '<div class="question-hint">' + escHtml(locStr(q.feedback.hint, locale)) + '</div>';
  }

  // Answer input
  html += renderAnswerInput(q, idx, locale);

  document.getElementById('question-area').innerHTML = html;

  // Scroll to top on question change
  window.scrollTo(0, 0);

  // Nav buttons
  document.getElementById('btn-prev').style.display = idx > 0 ? '' : 'none';
  document.getElementById('btn-skip').style.display = (testState.settings.allow_skip !== false) ? '' : 'none';

  var isLast = idx === total - 1;
  var nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = isLast ? tr('finish') : tr('next');
}

function renderMediaRefs(refs, locale) {
  var html = '';
  refs.forEach(function(refId) {
    var m = testState.mediaMap[refId];
    if (!m) return;
    html += renderMedia(m, locale);
  });
  return html;
}

function renderMedia(m, locale) {
  var html = '<div class="question-media">';
  if (m.type === 'image') {
    var src = '';
    if (m.data) {
      var b64 = locStr(m.data, locale);
      if (b64) src = 'data:' + (m.mime_type || 'image/png') + ';base64,' + b64;
    }
    if (!src && m.url) {
      src = locStr(m.url, locale);
    }
    var alt = m.alt_text ? escHtml(locStr(m.alt_text, locale)) : '';
    if (src) html += '<img src="' + escHtml(src) + '" alt="' + alt + '">';
  } else if (m.type === 'audio') {
    var audioSrc = '';
    if (m.data) {
      var b64a = locStr(m.data, locale);
      if (b64a) audioSrc = 'data:' + (m.mime_type || 'audio/mpeg') + ';base64,' + b64a;
    }
    if (!audioSrc && m.url) {
      audioSrc = locStr(m.url, locale);
    }
    if (audioSrc) html += '<audio controls src="' + escHtml(audioSrc) + '"></audio>';
  }
  html += '</div>';
  return html;
}

function renderAnswerInput(q, idx, locale) {
  var type = q.answer_type;
  var config = q.answer_config || {};
  var saved = testState.answers[idx];

  if (type === 'single_choice') {
    return renderSingleChoice(config, saved, idx, locale);
  } else if (type === 'multi_choice') {
    return renderMultiChoice(config, saved, idx, locale);
  } else if (type === 'number') {
    return renderNumberInput(saved, idx);
  } else if (type === 'free_text') {
    return renderFreeText(saved, idx);
  }
  return '<p style="color:#888;">Unknown answer type: ' + escHtml(type) + '</p>';
}

function renderSingleChoice(config, saved, idx, locale) {
  var options = config.options || [];
  if (config.shuffle_options) {
    // Shuffle once and cache so re-renders keep the same order
    if (!testState.shuffledOptions) testState.shuffledOptions = {};
    if (!testState.shuffledOptions[idx]) {
      testState.shuffledOptions[idx] = shuffle(options);
    }
    options = testState.shuffledOptions[idx];
  }

  var html = '<ul class="option-list">';
  options.forEach(function(opt) {
    var sel = (saved === opt.id) ? ' selected' : '';
    html += '<li class="option-item' + sel + '" onclick="selectOption(' + idx + ',\'' + escHtml(opt.id) + '\')">';
    html += '<span class="option-radio"></span>';
    html += '<span>';
    html += escHtml(locStr(opt.text, locale));
    // Option media
    if (opt.media_ref && testState.mediaMap[opt.media_ref]) {
      var m = testState.mediaMap[opt.media_ref];
      if (m.type === 'image') {
        var src = '';
        if (m.data) { var b64o = locStr(m.data, locale); if (b64o) src = 'data:' + (m.mime_type || 'image/png') + ';base64,' + b64o; }
        if (!src && m.url) src = locStr(m.url, locale);
        if (src) html += '<div class="option-media"><img src="' + escHtml(src) + '" alt="' + escHtml(locStr(m.alt_text, locale) || '') + '"></div>';
      }
    }
    html += '</span>';
    html += '</li>';
  });
  html += '</ul>';
  // Single translate button for all options
  html += makeTranslateBtnOptions(options, locale);
  return html;
}

function renderMultiChoice(config, saved, idx, locale) {
  var options = config.options || [];
  if (config.shuffle_options) {
    if (!testState.shuffledOptions) testState.shuffledOptions = {};
    if (!testState.shuffledOptions[idx]) {
      testState.shuffledOptions[idx] = shuffle(options);
    }
    options = testState.shuffledOptions[idx];
  }
  var selected = Array.isArray(saved) ? saved : [];

  var html = '<ul class="option-list">';
  options.forEach(function(opt) {
    var sel = selected.indexOf(opt.id) >= 0 ? ' selected' : '';
    html += '<li class="option-item' + sel + '" onclick="toggleMultiOption(' + idx + ',\'' + escHtml(opt.id) + '\')">';
    html += '<span class="option-checkbox"></span>';
    html += '<span>';
    html += escHtml(locStr(opt.text, locale));
    if (opt.media_ref && testState.mediaMap[opt.media_ref]) {
      var m = testState.mediaMap[opt.media_ref];
      if (m.type === 'image') {
        var src = '';
        if (m.data) { var b64o = locStr(m.data, locale); if (b64o) src = 'data:' + (m.mime_type || 'image/png') + ';base64,' + b64o; }
        if (!src && m.url) src = locStr(m.url, locale);
        if (src) html += '<div class="option-media"><img src="' + escHtml(src) + '" alt="' + escHtml(locStr(m.alt_text, locale) || '') + '"></div>';
      }
    }
    html += '</span>';
    html += '</li>';
  });
  html += '</ul>';
  html += makeTranslateBtnOptions(options, locale);
  return html;
}

function toggleMultiOption(idx, optId) {
  var q = testState.questions[idx];
  var current = testState.answers[idx];
  if (!Array.isArray(current)) current = [];
  var pos = current.indexOf(optId);
  if (pos >= 0) {
    current.splice(pos, 1);
  } else {
    current.push(optId);
  }
  trackEvent(q.id, 'answer_changed', { answer: current.slice() });
  testState.answers[idx] = current.length > 0 ? current : null;
  renderQuestion();
}

function selectOption(idx, optId) {
  var q = testState.questions[idx];
  var prev = testState.answers[idx];
  if (prev && prev !== optId) {
    trackEvent(q.id, 'answer_changed', { previous_answer: prev, new_answer: optId });
  } else if (!prev) {
    trackEvent(q.id, 'answer_submitted', { answer: optId });
  }
  testState.answers[idx] = optId;
  renderQuestion();
}

function renderNumberInput(saved, idx) {
  var val = (saved !== null && saved !== undefined) ? saved : '';
  return '<input type="number" class="number-input" id="number-answer" value="' + escHtml(String(val)) + '" ' +
    'oninput="saveNumberAnswer(' + idx + ')" placeholder="' + escHtml(tr('enterNumber')) + '">';
}

function saveNumberAnswer(idx) {
  var el = document.getElementById('number-answer');
  if (el) {
    var v = el.value.trim();
    testState.answers[idx] = v === '' ? null : parseFloat(v);
  }
}

function renderFreeText(saved, idx) {
  var val = saved || '';
  return '<textarea class="free-text-input" id="text-answer" oninput="saveTextAnswer(' + idx + ')" placeholder="' + escHtml(tr('typeAnswer')) + '">' +
    escHtml(val) + '</textarea>';
}

function saveTextAnswer(idx) {
  var el = document.getElementById('text-answer');
  if (el) testState.answers[idx] = el.value;
}

// ── Navigation ───────────────────────────────────────────────────────────────
function nextQuestion() {
  // Save any pending input
  saveCurrentInput();

  if (testState.currentIndex >= testState.questions.length - 1) {
    // Last question — confirm finish
    var unanswered = testState.answers.filter(function(a) { return a === null || a === undefined || a === ''; }).length;
    var msg = tr('submitTest');
    if (unanswered > 0) msg = trFmt('unansweredWarning', unanswered);
    if (confirm(msg)) {
      exitCurrentQuestion();
      finishTest();
    }
    return;
  }

  exitCurrentQuestion();
  testState.currentIndex++;
  renderQuestion();
}

function prevQuestion() {
  saveCurrentInput();
  if (testState.currentIndex > 0) {
    exitCurrentQuestion();
    testState.currentIndex--;
    renderQuestion();
  }
}

function skipQuestion() {
  if (testState.currentIndex < testState.questions.length - 1) {
    exitCurrentQuestion();
    testState.currentIndex++;
    renderQuestion();
  }
}

function saveCurrentInput() {
  var idx = testState.currentIndex;
  var q = testState.questions[idx];
  if (q.answer_type === 'number') {
    saveNumberAnswer(idx);
  } else if (q.answer_type === 'free_text') {
    saveTextAnswer(idx);
  }
}

function finishTest() {
  stopTimer();
  gradeTest();
}

// ── Grading ──────────────────────────────────────────────────────────────────
function gradeTest() {
  var questions = testState.questions;
  var answers = testState.answers;
  var locale = testState.locale;
  var results = [];
  var aiQueue = [];

  questions.forEach(function(q, i) {
    var answer = answers[i];
    var config = q.answer_config || {};
    var evaluation = q.evaluation || {};
    var result = {
      questionId: q.id,
      questionText: locStr(q.text, locale),
      answer: answer,
      weight: q.weight || 1,
      status: 'skipped', // skipped, correct, incorrect, pending
      score: 0,          // 0-1
      feedback: null
    };

    if (answer === null || answer === undefined || answer === '') {
      result.status = 'skipped';
      results.push(result);
      return;
    }

    if (evaluation.method === 'ai') {
      // Queue for AI grading
      result.status = 'pending';
      result.aiIndex = i;
      aiQueue.push({ index: results.length, question: q, answer: answer });
      results.push(result);
      return;
    }

    // Deterministic grading
    if (q.answer_type === 'single_choice') {
      var correct = config.correct_answer;
      if (answer === correct) {
        result.status = 'correct';
        result.score = 1;
      } else {
        result.status = 'incorrect';
        result.score = 0;
        // Find correct answer text
        var correctOpt = (config.options || []).find(function(o) { return o.id === correct; });
        result.correctAnswer = correctOpt ? locStr(correctOpt.text, locale) : correct;
      }
    } else if (q.answer_type === 'multi_choice') {
      var correctArr = config.correct_answers || config.correct_answer || [];
      if (!Array.isArray(correctArr)) correctArr = [correctArr];
      var userArr = Array.isArray(answer) ? answer : [];
      var correctSet = {};
      correctArr.forEach(function(id) { correctSet[id] = true; });
      var userSet = {};
      userArr.forEach(function(id) { userSet[id] = true; });
      var allMatch = correctArr.length === userArr.length &&
        correctArr.every(function(id) { return userSet[id]; });
      if (allMatch) {
        result.status = 'correct';
        result.score = 1;
      } else {
        result.status = 'incorrect';
        result.score = 0;
        result.correctAnswer = correctArr.map(function(id) {
          var o = (config.options || []).find(function(x) { return x.id === id; });
          return o ? locStr(o.text, locale) : id;
        }).join(', ');
      }
    } else if (q.answer_type === 'number') {
      var tolerance = config.numeric_tolerance || 0;
      var correctNum = config.correct_answer;
      if (typeof correctNum === 'number' && Math.abs(answer - correctNum) <= tolerance) {
        result.status = 'correct';
        result.score = 1;
      } else {
        result.status = 'incorrect';
        result.score = 0;
        result.correctAnswer = String(correctNum);
      }
    } else if (q.answer_type === 'free_text' && evaluation.method !== 'ai') {
      // Simple deterministic text match
      var correctText = config.correct_answer;
      if (correctText !== null && correctText !== undefined) {
        var caseSensitive = config.case_sensitive !== false;
        var userAns = caseSensitive ? String(answer) : String(answer).toLowerCase();
        var expected = caseSensitive ? String(correctText) : String(correctText).toLowerCase();
        if (userAns.trim() === expected.trim()) {
          result.status = 'correct';
          result.score = 1;
        } else {
          result.status = 'incorrect';
          result.score = 0;
          result.correctAnswer = String(correctText);
        }
      } else {
        // No correct answer defined, treat as pending for manual review
        result.status = 'pending';
      }
    }

    // Add feedback
    if (q.feedback) {
      if (result.status === 'correct' && q.feedback.correct_comment) {
        result.feedback = locStr(q.feedback.correct_comment, locale);
      }
      if (q.feedback.explanation) {
        result.explanation = locStr(q.feedback.explanation, locale);
      }
    }

    results.push(result);
  });

  testState.results = results;

  if (aiQueue.length > 0 && isAIEnabled()) {
    gradeWithAI(aiQueue, results);
  } else {
    showResults(results);
  }
}

function gradeWithAI(aiQueue, results) {
  var overlay = document.getElementById('grading-overlay');
  var statusEl = document.getElementById('grading-status');
  overlay.style.display = 'flex';

  var completed = 0;
  var total = aiQueue.length;
  var locale = testState.locale;

  statusEl.textContent = tr('gradingAI') + ' (0/' + total + ')';

  var promises = aiQueue.map(function(item) {
    var q = item.question;
    var answer = item.answer;
    var config = q.answer_config || {};
    var evaluation = q.evaluation || {};

    var promptContext = evaluation.ai_prompt_context ? locStr(evaluation.ai_prompt_context, locale) : '';
    var resultType = evaluation.result_type || 'boolean';

    var prompt = 'You are grading a test question.\n\n' +
      'Question: ' + locStr(q.text, locale) + '\n' +
      'Student answer: ' + String(answer) + '\n';
    if (promptContext) prompt += 'Grading instructions: ' + promptContext + '\n';
    if (resultType === 'percentage') {
      prompt += '\nGrade this answer from 0 to 100 percent. Respond with ONLY a JSON object: {"score": <0-100>, "feedback": "<brief feedback>"}\n';
    } else {
      prompt += '\nIs this answer correct? Respond with ONLY a JSON object: {"correct": true/false, "feedback": "<brief feedback>"}\n';
    }

    var aiModel = getAiModel();
    return fetch('https://generativelanguage.googleapis.com/v1beta/models/' + encodeURIComponent(aiModel) + ':generateContent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-goog-api-key': getSetting('ApiKey') },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      completed++;
      statusEl.textContent = tr('gradingAI') + ' (' + completed + '/' + total + ')';

      var result = results[item.index];
      try {
        var text = data.candidates[0].content.parts[0].text;
        // Extract JSON from response
        var jsonMatch = text.match(/\{[\s\S]*?\}/);
        if (jsonMatch) {
          var parsed = JSON.parse(jsonMatch[0]);
          if (resultType === 'percentage') {
            var pct = Math.max(0, Math.min(100, parsed.score || 0));
            result.score = pct / 100;
            result.status = pct >= 100 ? 'correct' : (pct > 0 ? 'partial' : 'incorrect');
            result.feedback = parsed.feedback || '';
            result.aiScore = pct + '%';
          } else {
            result.score = parsed.correct ? 1 : 0;
            result.status = parsed.correct ? 'correct' : 'incorrect';
            result.feedback = parsed.feedback || '';
          }
          // Store AI evaluation details for evaluation JSON
          result.aiEvaluation = {
            model: aiModel,
            prompt_version: 'v1.0',
            raw_response: text,
            confidence: parsed.confidence || null,
            evaluated_at: new Date().toISOString()
          };
        } else {
          result.status = 'pending';
          result.feedback = 'AI could not grade this answer.';
        }
      } catch(e) {
        result.status = 'pending';
        result.feedback = 'AI grading error.';
      }
    })
    .catch(function() {
      completed++;
      results[item.index].status = 'pending';
      results[item.index].feedback = 'AI grading failed (connection error).';
    });
  });

  Promise.all(promises).then(function() {
    overlay.style.display = 'none';
    showResults(results);
  });
}

// ── Test Attempt JSON ────────────────────────────────────────────────────────
var lastAttemptJSON = null;

function buildTestAttemptJSON(gradedResults) {
  var t = currentTest.test;
  var ts = testState;
  var finishedAt = new Date().toISOString();
  var startedAt = ts.startedAt;
  var durationSeconds = Math.round((new Date(finishedAt) - new Date(startedAt)) / 1000);

  var attempt = {
    test_attempt: {
      id: 'attempt_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
      test_id: t.id,
      test_version: t.version || 1,
      participant_id: getSelectedUser() || 'anonymous',
      locale: ts.locale,
      status: 'completed',

      device: {
        platform: 'web',
        screen_size: window.innerWidth + 'x' + window.innerHeight,
        user_agent: navigator.userAgent
      },

      active_settings: {
        shuffle_questions: !!(t.settings && t.settings.shuffle_questions),
        shuffle_options: ts.questions.some(function(q) { return q.answer_config && q.answer_config.shuffle_options; }),
        show_hints: !!(ts.settings && ts.settings.show_hints),
        time_limit_seconds: ts.timerLimit || null
      },

      timing: {
        started_at: startedAt,
        finished_at: finishedAt,
        duration_seconds: durationSeconds,
        idle_time_seconds: null
      },

      navigation_path: ts.navigationPath,

      question_responses: ts.questions.map(function(q, i) {
        var answer = ts.answers[i];
        var events = ts.questionEvents[q.id] || [];
        var timeSpent = ts.questionTimers[q.id] ? Math.round(ts.questionTimers[q.id].total) : 0;

        // Option order for single_choice
        var optionOrder = null;
        if (q.answer_type === 'single_choice' && q.answer_config) {
          var opts = q.answer_config.options || [];
          if (q.answer_config.shuffle_options && ts.shuffledOptions && ts.shuffledOptions[i]) {
            opts = ts.shuffledOptions[i];
          }
          optionOrder = opts.map(function(o) { return o.id; });
        }

        // Final answer timestamp — last answer event
        var lastAnswerEvt = null;
        for (var e = events.length - 1; e >= 0; e--) {
          if (events[e].type === 'answer_submitted' || events[e].type === 'answer_changed') {
            lastAnswerEvt = events[e].timestamp;
            break;
          }
        }

        var resp = {
          question_id: q.id,
          presented_order: i + 1,
          option_order_presented: optionOrder,
          final_answer: answer !== null && answer !== undefined ? answer : null,
          final_answer_at: lastAnswerEvt,
          time_spent_seconds: timeSpent,
          skipped: answer === null || answer === undefined || answer === '',
          events: events
        };
        return resp;
      })
    }
  };

  return attempt;
}

function downloadJSON(obj, filename) {
  var json = JSON.stringify(obj, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadAttemptData() {
  if (!lastAttemptJSON) return;
  var json = JSON.stringify(lastAttemptJSON, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var t = lastAttemptJSON.test_attempt;
  a.href = url;
  a.download = 'test-attempt_' + (t.participant_id || 'unknown') + '_' + t.timing.started_at.replace(/[:.]/g, '-').replace('T', '_').substr(0, 19) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Test Evaluation JSON ─────────────────────────────────────────────────────
var lastEvaluationJSON = null;

function buildTestEvaluationJSON(gradedResults) {
  var t = currentTest.test;
  var ts = testState;
  var attemptId = lastAttemptJSON ? lastAttemptJSON.test_attempt.id : null;
  var evaluatedAt = new Date().toISOString();

  var questionResults = [];
  var totalQuestions = gradedResults.length;
  var evaluated = 0;
  var failedEvaluations = 0;
  var maxWeighted = 0;
  var achievedWeighted = 0;
  var totalUnweightedScore = 0;

  gradedResults.forEach(function(r, i) {
    var q = ts.questions[i];
    var evaluation = q.evaluation || {};
    var weight = r.weight || 1;
    var method = evaluation.method === 'ai' ? 'ai' : 'deterministic';
    var resultType = evaluation.result_type || 'boolean';

    var qr = {
      question_id: r.questionId,
      evaluation_method: method,
      result_type: resultType,
      correct: null,
      score: r.score,
      weight: weight
    };

    if (r.status === 'pending' || r.status === 'skipped') {
      if (r.status === 'pending') failedEvaluations++;
      qr.score = 0;
    } else {
      evaluated++;
      if (r.status === 'partial') {
        qr.correct = null; // partial credit — neither fully correct nor incorrect
      } else if (resultType === 'boolean') {
        qr.correct = r.status === 'correct';
      } else {
        // percentage — correct is null per schema
        qr.correct = null;
      }
    }

    // Attach AI evaluation details if present
    if (method === 'ai' && r.aiEvaluation) {
      qr.ai_evaluation = {
        model: r.aiEvaluation.model,
        prompt_version: r.aiEvaluation.prompt_version,
        raw_response: r.aiEvaluation.raw_response,
        confidence: r.aiEvaluation.confidence,
        evaluated_at: r.aiEvaluation.evaluated_at
      };
    }

    maxWeighted += weight;
    achievedWeighted += qr.score * weight;
    totalUnweightedScore += qr.score;

    questionResults.push(qr);
  });

  var weightedScore = maxWeighted > 0 ? Math.round((achievedWeighted / maxWeighted) * 1000) / 1000 : 0;
  var unweightedScore = totalQuestions > 0 ? Math.round((totalUnweightedScore / totalQuestions) * 10000) / 10000 : 0;

  var status = 'complete';
  if (failedEvaluations > 0 && evaluated > 0) status = 'partial';
  if (failedEvaluations > 0 && evaluated === 0) status = 'failed';

  return {
    test_evaluation: {
      id: 'eval_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
      attempt_id: attemptId,
      test_id: t.id,
      test_version: t.version || 1,
      evaluated_at: evaluatedAt,
      status: status,
      question_results: questionResults,
      summary: {
        total_questions: totalQuestions,
        evaluated: evaluated,
        failed_evaluations: failedEvaluations,
        weighted_score: weightedScore,
        unweighted_score: unweightedScore,
        max_possible_weighted: maxWeighted,
        achieved_weighted: Math.round(achievedWeighted * 1000) / 1000
      }
    }
  };
}

function downloadEvaluationData() {
  if (!lastEvaluationJSON) return;
  var json = JSON.stringify(lastEvaluationJSON, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var ev = lastEvaluationJSON.test_evaluation;
  var attemptId = ev.attempt_id || 'unknown';
  a.href = url;
  a.download = 'test-evaluation_' + attemptId + '_' + ev.evaluated_at.replace(/[:.]/g, '-').replace('T', '_').substr(0, 19) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Topic Scores ─────────────────────────────────────────────────────────────
function getUserTopicScore(userName, topicId) {
  var users = getUsers();
  var user = users.find(function(u) { return u.name === userName; });
  if (!user || !user.topicScores) return 0;
  return user.topicScores[topicId] || 0;
}

function setUserTopicScore(userName, topicId, score) {
  var users = getUsers();
  var user = users.find(function(u) { return u.name === userName; });
  if (!user) return;
  if (!user.topicScores) user.topicScores = {};
  user.topicScores[topicId] = Math.max(0, Math.min(100, Math.round(score)));
  saveUsers(users);
}

function recalculateTopicScore(topicId, userName, topicConfig) {
  if (!topicConfig || !topicConfig.tests) return;
  var visibleTests = topicConfig.tests.filter(function(t) { return t.visible !== false; });
  if (!visibleTests.length) return;

  // Total achievable weighted score across all visible tests
  var totalMaxWeighted = 0;
  visibleTests.forEach(function(t) {
    totalMaxWeighted += (t.maxWeightedScore || 0);
  });
  if (totalMaxWeighted === 0) return;

  // Collect all results for this user + topic
  var allResults = getTestResults();
  var userResults = allResults.filter(function(r) { return r.user === userName && r.topicId === topicId; });

  // Build global best score per question across ALL attempts (standard + AI)
  // questionId -> { bestScore: 0-1, weight: number }
  var bestByQuestion = {};
  userResults.forEach(function(r) {
    if (!r.details) return;

    // Build a question_id lookup from evaluationData for backward compatibility
    // (older results may not have questionId in details)
    var evalQIds = {};
    if (r.evaluationData && r.evaluationData.test_evaluation && r.evaluationData.test_evaluation.question_results) {
      r.evaluationData.test_evaluation.question_results.forEach(function(qr, idx) {
        if (qr.question_id) evalQIds[idx] = qr.question_id;
      });
    }

    r.details.forEach(function(d, idx) {
      // Use questionId from details, fall back to evaluationData
      var qId = d.questionId || evalQIds[idx] || null;
      if (!qId) return;
      var score = d.score || 0;
      var weight = d.weight || 1;
      if (!bestByQuestion[qId]) {
        bestByQuestion[qId] = { bestScore: score, weight: weight };
      } else {
        if (score > bestByQuestion[qId].bestScore) {
          bestByQuestion[qId].bestScore = score;
        }
        // Use the largest weight seen for this question
        if (weight > bestByQuestion[qId].weight) {
          bestByQuestion[qId].weight = weight;
        }
      }
    });
  });

  // For each visible test, find its questions from the best attempt for that test file,
  // then sum the best per-question scores (from the global map)
  var totalEarned = 0;
  visibleTests.forEach(function(t) {
    // Find all attempts for this test file to discover which questions it contains
    var testResults = userResults.filter(function(r) { return r.testFile === t.file; });
    if (!testResults.length) return;

    // Collect all unique question IDs from any attempt of this test
    var testQuestionIds = {};
    testResults.forEach(function(r) {
      if (!r.details) return;
      // Build eval lookup for backward compat
      var evalQIds = {};
      if (r.evaluationData && r.evaluationData.test_evaluation && r.evaluationData.test_evaluation.question_results) {
        r.evaluationData.test_evaluation.question_results.forEach(function(qr, idx) {
          if (qr.question_id) evalQIds[idx] = qr.question_id;
        });
      }
      r.details.forEach(function(d, idx) {
        var qId = d.questionId || evalQIds[idx] || null;
        if (qId && !testQuestionIds[qId]) {
          testQuestionIds[qId] = d.weight || 1;
        }
      });
    });

    // Sum best scores for this test's questions
    var testEarned = 0;
    Object.keys(testQuestionIds).forEach(function(qId) {
      var best = bestByQuestion[qId];
      if (best) {
        testEarned += best.bestScore * best.weight;
      }
    });

    // Cap at this test's maxWeightedScore
    var maxW = t.maxWeightedScore || 0;
    if (testEarned > maxW) testEarned = maxW;
    totalEarned += testEarned;
  });

  var newScore = Math.round(totalEarned / totalMaxWeighted * 100);
  var oldScore = getUserTopicScore(userName, topicId);
  // Score only increases
  if (newScore > oldScore) {
    setUserTopicScore(userName, topicId, newScore);
  }
}

// ── Results Screen ───────────────────────────────────────────────────────────
function showResults(results) {
  // Calculate score
  var totalWeight = 0;
  var earnedWeight = 0;
  results.forEach(function(r) {
    totalWeight += r.weight;
    earnedWeight += r.score * r.weight;
  });
  var pct = totalWeight > 0 ? Math.round(earnedWeight / totalWeight * 100) : 0;
  var scoreClass = pct >= 80 ? 'good' : (pct >= 50 ? 'ok' : 'poor');

  var correct = results.filter(function(r) { return r.status === 'correct'; }).length;
  var partial = results.filter(function(r) { return r.status === 'partial'; }).length;
  var incorrect = results.filter(function(r) { return r.status === 'incorrect'; }).length;
  var skipped = results.filter(function(r) { return r.status === 'skipped'; }).length;
  var pending = results.filter(function(r) { return r.status === 'pending'; }).length;

  // Build attempt & evaluation JSON before testState is cleared
  lastAttemptJSON = buildTestAttemptJSON(results);
  lastEvaluationJSON = buildTestEvaluationJSON(results);

  // Save result
  saveTestResult(pct, results);

  // Show screen
  hideAll();
  document.getElementById('results-screen').style.display = 'block';

  var t = currentTest.test;
  var locale = getUILang();
  document.getElementById('results-title').textContent = locStr(t.title, locale) + ' — ' + tr('results');

  var scoreHtml = '<div class="score-circle ' + scoreClass + '">' +
    '<span class="score-pct">' + pct + '%</span>' +
    '<span class="score-label">' + tr('score') + '</span>' +
    '</div>';
  scoreHtml += '<div class="result-summary">' +
    correct + ' ' + tr('correct');
  if (partial > 0) scoreHtml += ', ' + partial + ' ' + tr('partial');
  scoreHtml += ', ' + incorrect + ' ' + tr('incorrect');
  if (skipped > 0) scoreHtml += ', ' + skipped + ' ' + tr('skipped').toLowerCase();
  if (pending > 0) scoreHtml += ', ' + pending + ' ' + tr('pendingReview');
  scoreHtml += '</div>';

  // Show topic score (already recalculated by saveTestResult above)
  var topicId = null;
  if (currentTest._sourceFile) {
    var parts = currentTest._sourceFile.split('/');
    if (parts.length >= 2) topicId = parts[0];
  }
  if (topicId) {
    var userName = getSelectedUser() || 'Anonymous';
    var topicScore = getUserTopicScore(userName, topicId);
    scoreHtml += '<div class="result-topic-score">' + escHtml(tr('topicScore')) + ': <b>' + topicScore + '%</b></div>';
  }

  document.getElementById('score-area').innerHTML = scoreHtml;

  // AI Evaluation section (if available)
  var evalArea = '';
  if (currentTest._aiEvaluation) {
    var aiEval = currentTest._aiEvaluation;
    evalArea += '<div class="ai-evaluation">';

    // Overall assessment
    if (aiEval.overall) {
      var overallText = locStr(aiEval.overall, locale);
      if (overallText) {
        evalArea += '<div class="ai-eval-overall">' + escHtml(overallText) + '</div>';
      }
    }

    // Strengths
    if (aiEval.strengths && aiEval.strengths.length) {
      evalArea += '<div class="ai-eval-section ai-eval-strengths">';
      evalArea += '<div class="ai-eval-heading">' + escHtml(tr('strengths')) + '</div>';
      evalArea += '<ul>';
      aiEval.strengths.forEach(function(s) {
        var txt = locStr(s, locale);
        if (txt) evalArea += '<li>' + escHtml(txt) + '</li>';
      });
      evalArea += '</ul></div>';
    }

    // Areas for improvement
    if (aiEval.improvements && aiEval.improvements.length) {
      evalArea += '<div class="ai-eval-section ai-eval-improvements">';
      evalArea += '<div class="ai-eval-heading">' + escHtml(tr('improvements')) + '</div>';
      evalArea += '<ul>';
      aiEval.improvements.forEach(function(s) {
        var txt = locStr(s, locale);
        if (txt) evalArea += '<li>' + escHtml(txt) + '</li>';
      });
      evalArea += '</ul></div>';
    }

    evalArea += '</div>';
  }
  document.getElementById('ai-eval-area').innerHTML = evalArea;

  // Detail
  var showCorrectAnswer = testState.settings.show_correct_answer_comment !== false;
  var detailHtml = '';
  results.forEach(function(r, i) {
    detailHtml += '<div class="result-item ' + r.status + '">';
    detailHtml += '<div class="result-q-text">' + (i + 1) + '. ' + escHtml(r.questionText) + '</div>';

    if (r.status === 'skipped') {
      detailHtml += '<div class="result-answer" style="color:#999;">' + tr('skipped') + '</div>';
    } else {
      var answerDisplay = formatAnswer(r.answer, testState.questions[i], locale);
      detailHtml += '<div class="result-answer">' + tr('yourAnswer') + ': <b>' + escHtml(answerDisplay) + '</b>';
      if (r.aiScore) detailHtml += ' (AI score: ' + r.aiScore + ')';
      detailHtml += '</div>';
    }

    if ((r.status === 'incorrect' || r.status === 'partial') && r.correctAnswer && showCorrectAnswer) {
      detailHtml += '<div class="result-answer" style="color:#2a9d3a;">' + tr('correctAnswer') + ': <b>' + escHtml(r.correctAnswer) + '</b></div>';
    }

    if (r.feedback) {
      detailHtml += '<div class="result-feedback">' + escHtml(r.feedback) + '</div>';
    }
    if (r.explanation && showCorrectAnswer) {
      detailHtml += '<div class="result-feedback"><b>' + tr('explanation') + '</b> ' + escHtml(r.explanation) + '</div>';
    }

    detailHtml += '</div>';
  });
  document.getElementById('results-detail').innerHTML = detailHtml;

  // Reset download buttons to use live data
  var btnAttempt = document.getElementById('btn-download-attempt');
  var btnEval = document.getElementById('btn-download-evaluation');
  btnAttempt.style.display = '';
  btnAttempt.onclick = downloadAttemptData;
  btnEval.style.display = '';
  btnEval.onclick = downloadEvaluationData;

  // Reset back button
  var btnBack = document.getElementById('btn-back-to-menu');
  btnBack.textContent = tr('backToMenu');
  btnBack.onclick = showMenu;

  viewingHistoryIndex = -1;
  testState = null;
}

function formatAnswer(answer, question, locale) {
  if (answer === null || answer === undefined) return '—';
  if (question.answer_type === 'single_choice') {
    var config = question.answer_config || {};
    var opt = (config.options || []).find(function(o) { return o.id === answer; });
    return opt ? locStr(opt.text, locale) : String(answer);
  }
  if (question.answer_type === 'multi_choice' && Array.isArray(answer)) {
    var config2 = question.answer_config || {};
    return answer.map(function(id) {
      var opt = (config2.options || []).find(function(o) { return o.id === id; });
      return opt ? locStr(opt.text, locale) : id;
    }).join(', ');
  }
  return String(answer);
}

// ── Test History ─────────────────────────────────────────────────────────────
function getTestResults() {
  var data = getAppData();
  return data.testResults || [];
}

function saveTestResult(pct, results) {
  var data = getAppData();
  if (!data.testResults) data.testResults = [];
  var t = currentTest.test;
  var locale = getUILang();

  // Build display-friendly details with resolved answer text
  var savedDetails = results.map(function(r, i) {
    var detail = {
      questionId: r.questionId || null,
      questionText: r.questionText,
      status: r.status,
      score: r.score,
      weight: r.weight,
      answer: r.answer,
      correctAnswer: r.correctAnswer || null,
      feedback: r.feedback || null,
      explanation: r.explanation || null,
      aiScore: r.aiScore || null
    };
    // Resolve answer display text while testState is still available
    if (testState && testState.questions && testState.questions[i]) {
      detail.answerDisplay = formatAnswer(r.answer, testState.questions[i], locale);
    } else {
      detail.answerDisplay = r.answer != null ? String(r.answer) : null;
    }
    return detail;
  });

  // Calculate weighted scores for topic scoring
  var totalWeight = 0;
  var earnedWeight = 0;
  results.forEach(function(r) {
    totalWeight += r.weight;
    earnedWeight += r.score * r.weight;
  });

  // Extract topicId and testFile from _sourceFile (e.g. "animals/test-zivocichove.json")
  var topicId = null;
  var testFile = null;
  if (currentTest._sourceFile) {
    var parts = currentTest._sourceFile.split('/');
    if (parts.length >= 2) {
      topicId = parts[0];
      testFile = parts.slice(1).join('/');
    }
  }

  var userName = getSelectedUser() || 'Anonymous';

  data.testResults.push({
    testId: t.id,
    testTitle: locStr(t.title, locale),
    user: userName,
    score: pct,
    totalQuestions: results.length,
    correct: results.filter(function(r) { return r.status === 'correct'; }).length,
    date: new Date().toISOString(),
    details: savedDetails,
    attemptData: lastAttemptJSON || null,
    evaluationData: lastEvaluationJSON || null,
    topicId: topicId,
    testFile: testFile,
    earnedWeight: earnedWeight,
    totalWeight: totalWeight,
    aiEvaluation: currentTest._aiEvaluation || null,
    topicScore: null  // filled in after recalculation below
  });

  saveAppData(data);

  // Recalculate topic score if this test belongs to a topic
  if (topicId && currentTopicConfig) {
    recalculateTopicScore(topicId, userName, currentTopicConfig);
    // Store the updated topic score in the result record
    var updatedTopicScore = getUserTopicScore(userName, topicId);
    var d2 = getAppData();
    var lastResult = d2.testResults[d2.testResults.length - 1];
    if (lastResult) {
      lastResult.topicScore = updatedTopicScore;
      saveAppData(d2);
    }
  }
}

function showHistory() {
  historyFilterUser = null;
  hideAll();
  document.getElementById('history-screen').style.display = 'block';
  setBackArrow(showMenu);
  document.getElementById('history-title').textContent = tr('testHistory');
  renderHistory();
}

var historyFilterUser = null;

function showUserHistory(userName) {
  historyFilterUser = userName;
  hideAll();
  document.getElementById('history-screen').style.display = 'block';
  setBackArrow(showUserManagement);
  document.getElementById('history-title').textContent = tr('testHistory') + ' — ' + userName;
  renderHistory();
}

function renderHistory() {
  var container = document.getElementById('history-list');
  var allResults = getTestResults();
  var user = historyFilterUser || getSelectedUser();

  // Filter by selected user if one is selected
  var results = user ? allResults.filter(function(r) { return r.user === user; }) : allResults;

  // Sort by date descending
  results.sort(function(a, b) { return b.date.localeCompare(a.date); });

  if (results.length === 0) {
    container.innerHTML = '<p style="color:#888; text-align:center;">' + escHtml(tr('noHistory')) +
      (user ? ' (' + escHtml(user) + ')' : '') + '</p>';
    return;
  }

  var html = '';
  if (user) {
    html += '<p style="text-align:center; color:#888; font-size:0.9rem;">' + escHtml(tr('showingResultsFor')) + ' ' + escHtml(user) + '</p>';
  }

  results.forEach(function(r, i) {
    var scoreClass = r.score >= 80 ? 'good' : (r.score >= 50 ? 'ok' : 'poor');
    var dateStr = new Date(r.date).toLocaleDateString();
    var idx = allResults.indexOf(r);
    html += '<div class="history-item">';
    html += '<div style="flex:1; cursor:pointer;" onclick="showHistoryDetail(' + idx + ')"><b>' + escHtml(r.testTitle) + '</b><br>' +
      '<span class="history-meta">' + escHtml(r.user) + ' &middot; ' + dateStr + ' &middot; ' +
      r.correct + '/' + r.totalQuestions + '</span></div>';
    html += '<span class="history-score ' + scoreClass + '">' + r.score + '%</span>';
    html += '<button class="history-delete-btn" onclick="event.stopPropagation(); deleteTestResult(' + idx + ')">&times;</button>';
    html += '</div>';
  });

  container.innerHTML = html;
}

function deleteTestResult(index) {
  var data = getAppData();
  if (!data.testResults || index < 0 || index >= data.testResults.length) return;
  var r = data.testResults[index];
  if (!confirm(tr('removeUserConfirm') + ':\n' + (r.testTitle || '') + ' (' + new Date(r.date).toLocaleDateString() + ')')) return;
  data.testResults.splice(index, 1);
  saveAppData(data);
  renderHistory();
}

var viewingHistoryIndex = -1;

function showHistoryDetail(index) {
  var allResults = getTestResults();
  var r = allResults[index];
  if (!r || !r.details) return;
  viewingHistoryIndex = index;

  hideAll();
  document.getElementById('results-screen').style.display = 'block';
  setBackArrow(showHistory);

  document.getElementById('results-title').textContent = r.testTitle + ' — ' + tr('results');

  var pct = r.score;
  var scoreClass = pct >= 80 ? 'good' : (pct >= 50 ? 'ok' : 'poor');

  var scoreHtml = '<div class="score-circle ' + scoreClass + '">' +
    '<span class="score-pct">' + pct + '%</span>' +
    '<span class="score-label">' + tr('score') + '</span>' +
    '</div>';
  scoreHtml += '<div class="result-summary">' +
    escHtml(r.user) + ' &middot; ' + new Date(r.date).toLocaleDateString() + '<br>' +
    r.correct + '/' + r.totalQuestions + ' ' + tr('correct') + '</div>';
  if (r.topicScore != null) {
    scoreHtml += '<div class="result-topic-score">' + escHtml(tr('topicScore')) + ': <b>' + r.topicScore + '%</b></div>';
  }
  document.getElementById('score-area').innerHTML = scoreHtml;

  // Show AI evaluation if stored
  var evalHtml = '';
  if (r.aiEvaluation) {
    var locale = getUILang();
    evalHtml += '<div class="ai-evaluation">';
    if (r.aiEvaluation.overall) {
      var overallText = locStr(r.aiEvaluation.overall, locale);
      if (overallText) evalHtml += '<div class="ai-eval-overall">' + escHtml(overallText) + '</div>';
    }
    if (r.aiEvaluation.strengths && r.aiEvaluation.strengths.length) {
      evalHtml += '<div class="ai-eval-section ai-eval-strengths"><div class="ai-eval-heading">' + escHtml(tr('strengths')) + '</div><ul>';
      r.aiEvaluation.strengths.forEach(function(s) {
        var txt = locStr(s, locale);
        if (txt) evalHtml += '<li>' + escHtml(txt) + '</li>';
      });
      evalHtml += '</ul></div>';
    }
    if (r.aiEvaluation.improvements && r.aiEvaluation.improvements.length) {
      evalHtml += '<div class="ai-eval-section ai-eval-improvements"><div class="ai-eval-heading">' + escHtml(tr('improvements')) + '</div><ul>';
      r.aiEvaluation.improvements.forEach(function(s) {
        var txt = locStr(s, locale);
        if (txt) evalHtml += '<li>' + escHtml(txt) + '</li>';
      });
      evalHtml += '</ul></div>';
    }
    evalHtml += '</div>';
  }
  document.getElementById('ai-eval-area').innerHTML = evalHtml;

  var detailHtml = '';
  r.details.forEach(function(d, i) {
    detailHtml += '<div class="result-item ' + d.status + '">';
    detailHtml += '<div class="result-q-text">' + (i + 1) + '. ' + escHtml(d.questionText) + '</div>';
    if (d.status === 'skipped') {
      detailHtml += '<div class="result-answer" style="color:#999;">' + tr('skipped') + '</div>';
    } else {
      var display = d.answerDisplay || (d.answer != null ? String(d.answer) : '—');
      detailHtml += '<div class="result-answer">' + tr('yourAnswer') + ': <b>' + escHtml(display) + '</b>';
      if (d.aiScore) detailHtml += ' (AI: ' + d.aiScore + ')';
      detailHtml += '</div>';
    }
    if ((d.status === 'incorrect' || d.status === 'partial') && d.correctAnswer) {
      detailHtml += '<div class="result-answer" style="color:#2a9d3a;">' + tr('correctAnswer') + ': <b>' + escHtml(d.correctAnswer) + '</b></div>';
    }
    if (d.feedback) {
      detailHtml += '<div class="result-feedback">' + escHtml(d.feedback) + '</div>';
    }
    if (d.explanation) {
      detailHtml += '<div class="result-feedback"><b>' + tr('explanation') + '</b> ' + escHtml(d.explanation) + '</div>';
    }
    detailHtml += '</div>';
  });
  document.getElementById('results-detail').innerHTML = detailHtml;

  // Show/hide download buttons based on stored data
  var btnAttempt = document.getElementById('btn-download-attempt');
  var btnEval = document.getElementById('btn-download-evaluation');
  if (r.attemptData) {
    btnAttempt.style.display = '';
    btnAttempt.onclick = function() { downloadJSON(r.attemptData, 'test-attempt_' + r.user + '_' + r.date.slice(0,10) + '.json'); };
  } else {
    btnAttempt.style.display = 'none';
  }
  if (r.evaluationData) {
    btnEval.style.display = '';
    btnEval.onclick = function() { downloadJSON(r.evaluationData, 'test-evaluation_' + r.user + '_' + r.date.slice(0,10) + '.json'); };
  } else {
    btnEval.style.display = 'none';
  }

  // Replace "Back to Menu" with "Back to History"
  var btnBack = document.getElementById('btn-back-to-menu');
  btnBack.textContent = tr('backToMenu');
  btnBack.onclick = showHistory;
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function locStr(obj, locale) {
  if (!obj) return '';
  if (typeof obj === 'string') return obj;
  if (obj[locale]) return obj[locale];
  // Fallback: test default_locale, then 'en', then first available
  var defLocale = currentTest && currentTest.test ? currentTest.test.default_locale : null;
  return (defLocale && obj[defLocale]) || obj['en'] || obj[Object.keys(obj)[0]] || '';
}

// ── Init ─────────────────────────────────────────────────────────────────────
showMenu();
