---
layout: default-en
title: Articles in English
permalink: /en/
---

<div class="posts">
  {% assign sorted_posts = site.posts_en | sort: "date" | reverse %}
  {% for post in sorted_posts %}
    <article class="post">
      <a href="{{ post.url }}">
        <h1>{{ post.title }}</h1>

        <div>
          <p class="post_date">{{ post.date | date: "%B %-d, %Y" }}</p>
        </div>
      </a>
      <div class="entry">
        {{ post.excerpt }}
      </div>

      <a href="{{ post.url }}" class="read-more">Read the full article…</a>
    </article>
  {% endfor %}
</div>
